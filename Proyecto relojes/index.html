/* ══════════════════════════════════════════════════
   RUTEO POR HASH — rutas con URL: #/ , #/admin , #/cuenta , #/carrito , #/producto/:id
══════════════════════════════════════════════════ */
function useHashRoute() {
  const [hash, setHash] = React.useState(window.location.hash || '#/');
  React.useEffect(() => {
    const fn = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);
  return hash;
}
function irARuta(r) { window.location.hash = r; }

// Requisitos minimos de contraseña (mismo criterio que el backend): 8+, mayuscula, minuscula y numero
function validarPassword(p) {
  if (!p || p.length < 8) return 'La contraseña debe tener al menos 8 caracteres';
  if (!/[A-Z]/.test(p)) return 'Debe incluir al menos una letra mayúscula';
  if (!/[a-z]/.test(p)) return 'Debe incluir al menos una letra minúscula';
  if (!/[0-9]/.test(p)) return 'Debe incluir al menos un número';
  return null;
}
const REQ_PASSWORD = 'Mínimo 8 caracteres, con mayúscula, minúscula y número.';

// Campo de contraseña con boton "Ver/Ocultar" para revisar lo que se escribe
function PasswordInput({ value, onChange, placeholder = '••••••••', style, required }) {
  const [ver, setVer] = React.useState(false);
  return (
    <div style={{ position: 'relative' }}>
      <input type={ver ? 'text' : 'password'} value={value} onChange={onChange} required={required} placeholder={placeholder}
        style={{ ...style, paddingRight: 62 }} />
      <button type="button" tabIndex={-1} onClick={() => setVer(v => !v)}
        style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-3)', padding: 4 }}>
        {ver ? 'Ocultar' : 'Ver'}
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PAGINA RESTABLECER CONTRASEÑA (abierta desde el enlace del correo)
══════════════════════════════════════════════════ */
function RestablecerPage({ token, onListo }) {
  const [nueva, setNueva]     = React.useState('');
  const [repetir, setRepetir] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [msg, setMsg]         = React.useState(null);
  const [done, setDone]       = React.useState(false);

  const inp = { width: '100%', padding: '12px 14px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 14, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 6 };

  const enviar = async (e) => {
    e.preventDefault(); setMsg(null);
    const errPwd = validarPassword(nueva);
    if (errPwd) { setMsg({ ok: false, texto: errPwd }); return; }
    if (nueva !== repetir) { setMsg({ ok: false, texto: 'Las contraseñas no coinciden' }); return; }
    setLoading(true);
    try {
      const r = await fetch(`${API}/api/usuario/restablecer`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, nuevaPassword: nueva }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'No se pudo restablecer la contraseña');
      setDone(true);
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--off-white)', padding: 24 }}>
      <div style={{ width: '100%', maxWidth: 420, background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '40px 36px', boxShadow: '0 20px 50px rgba(0,0,0,0.08)' }}>
        <div style={{ fontSize: 8, fontWeight: 600, letterSpacing: '0.26em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Dominican Watch Men</div>
        <div style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, color: 'var(--ink)', marginBottom: 20 }}>Nueva contraseña</div>

        {msg && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 16, fontSize: 12, background: msg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msg.ok ? '#bbf7d0' : '#fecaca'}`, color: msg.ok ? '#166534' : '#dc2626' }}>{msg.texto}</div>}

        {done ? (
          <>
            <div style={{ padding: '12px 14px', borderRadius: 6, marginBottom: 20, fontSize: 13, background: '#f0fdf4', border: '1px solid #bbf7d0', color: '#166534' }}>Tu contraseña fue restablecida correctamente. Ya puedes iniciar sesión con la nueva.</div>
            <button onClick={onListo} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Ir a Iniciar Sesión</button>
          </>
        ) : (
          <form onSubmit={enviar}>
            <div style={{ marginBottom: 14 }}><label style={lbl}>Nueva Contraseña</label><PasswordInput value={nueva} onChange={e => setNueva(e.target.value)} required style={inp} /><div style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 5 }}>{REQ_PASSWORD}</div></div>
            <div style={{ marginBottom: 18 }}><label style={lbl}>Confirmar Contraseña</label><PasswordInput value={repetir} onChange={e => setRepetir(e.target.value)} required style={{ ...inp, ...(repetir && nueva !== repetir ? { borderColor: 'var(--rose)' } : {}) }} />{repetir && nueva !== repetir && <div style={{ fontSize: 10, color: 'var(--rose)', marginTop: 5 }}>Las contraseñas no coinciden</div>}</div>
            <button type="submit" disabled={loading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer' }}>{loading ? 'Guardando...' : 'Restablecer Contraseña'}</button>
            <button type="button" onClick={onListo} style={{ width: '100%', padding: '10px', marginTop: 10, fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: 'none', cursor: 'pointer' }}>Cancelar</button>
          </form>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════ */
function App() {
  const [scrolled, setScrolled]         = React.useState(false);
  const [usuario, setUsuario]           = React.useState(null);
  const [refreshKey, setRefreshKey]     = React.useState(0);
  const [carrito, setCarrito]           = React.useState([]);
  const [ultimoPedido, setUltimoPedido] = React.useState(null);

  // Ruta actual (por hash)
  const hash = useHashRoute();
  const ruta = hash.replace(/^#/, '') || '/';
  const mProducto = ruta.match(/^\/producto\/(\d+)/);
  const productoId = mProducto ? parseInt(mProducto[1]) : null;
  const mReset = ruta.match(/^\/restablecer\/(.+)/);
  const esTaller = usuario && (usuario.rol === 'Fabricante' || usuario.rol === 'Admin');
  const esSoporte = usuario && (usuario.rol === 'Soporte' || usuario.rol === 'Admin');
  const pedirLogin = (ruta === '/admin' && !usuario?.esAdmin) || (ruta === '/perfil' && !usuario) || (ruta === '/fabricacion' && !esTaller) || (ruta === '/soporte' && !esSoporte); // ruta protegida sin permiso -> pide login

  // Agrega un item al carrito (agrupa por reloj+maquina+pulsera, sin pasar del stock disponible)
  const agregarAlCarrito = (item) => {
    const key = `${item.relojId}-${item.movimientoId}-${item.tipoPulseraId}`;
    setCarrito(prev => {
      const existe = prev.find(i => i.key === key);
      if (existe) return prev.map(i => i.key === key ? { ...i, cantidad: Math.min(i.max, i.cantidad + item.cantidad) } : i);
      return [...prev, { ...item, key }];
    });
    irARuta('/carrito');
  };
  const quitarDelCarrito = (key) => setCarrito(prev => prev.filter(i => i.key !== key));
  const vaciarCarrito = () => setCarrito([]);

  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  // Al cambiar de ruta, sube al tope
  React.useEffect(() => { window.scrollTo(0, 0); }, [ruta]);

  // Ruta /restablecer/{token} (pagina publica abierta desde el enlace del correo)
  if (mReset) {
    return <RestablecerPage token={mReset[1]} onListo={() => irARuta('/cuenta')} />;
  }

  // Ruta /admin (solo administradores)
  if (ruta === '/admin' && usuario?.esAdmin) {
    return (
      <AdminPage
        usuario={usuario}
        onVolver={() => irARuta('/')}
        onCambio={() => setRefreshKey(k => k + 1)}
      />
    );
  }

  // Ruta /checkout (pasos de la compra)
  if (ruta === '/checkout') {
    return (
      <CheckoutPage
        items={carrito}
        usuario={usuario}
        onVolver={() => irARuta('/carrito')}
        onConfirmado={(p) => { setUltimoPedido(p); vaciarCarrito(); irARuta('/confirmacion'); }}
      />
    );
  }

  // Ruta /confirmacion (pedido creado)
  if (ruta === '/confirmacion') {
    return <ConfirmacionPage pedido={ultimoPedido} onVolver={() => irARuta('/')} />;
  }

  // Ruta /perfil (cliente con sesion)
  if (ruta === '/perfil' && usuario) {
    return (
      <PerfilPage
        usuario={usuario}
        onActualizar={(u) => setUsuario(u)}
        onVolver={() => irARuta('/')}
        onLogout={() => { setUsuario(null); irARuta('/'); }}
      />
    );
  }

  // Ruta /garantia (pagina publica de garantia y preguntas)
  if (ruta === '/garantia') {
    return <GarantiaPage onVolver={() => irARuta('/')} />;
  }

  // Ruta /fabricacion (taller: solo Fabricante o Admin)
  if (ruta === '/fabricacion' && esTaller) {
    return <FabricacionPage usuario={usuario} onVolver={() => irARuta('/')} />;
  }

  // Ruta /soporte (solo Soporte o Admin)
  if (ruta === '/soporte' && esSoporte) {
    return <SoportePage usuario={usuario} onVolver={() => irARuta('/')} />;
  }

  return (
    <>
      <Nav
        scrolled={scrolled}
        usuario={usuario}
        onOpenCuenta={() => irARuta(usuario ? '/perfil' : '/cuenta')}
        onOpenAdmin={() => irARuta('/admin')}
        onNavigate={irARuta}
        carritoCount={carrito.reduce((s, i) => s + i.cantidad, 0)}
        onOpenCarrito={() => irARuta('/carrito')}
      />
      <Hero />
      <Strip />
      <CollectionGrid
        refreshKey={refreshKey}
        onAgregar={agregarAlCarrito}
        productoId={productoId}
        onAbrir={(id) => irARuta('/producto/' + id)}
        onCerrarDetalle={() => irARuta('/')}
        usuario={usuario}
      />
      <Editorial />
      <Specs />
      <Process />
      <Testimonials />
      <FAQ />
      <CTABanner />
      <Footer />
      <PanelCuenta
        open={ruta === '/cuenta' || pedirLogin}
        onClose={() => irARuta('/')}
        usuario={usuario}
        onLogin={u => { setUsuario(u); irARuta(u.esAdmin ? '/admin' : '/'); }}
        onLogout={() => { setUsuario(null); irARuta('/'); }}
        onRelojCreado={() => setRefreshKey(k => k + 1)}
      />
      <CarritoPanel
        open={ruta === '/carrito'}
        items={carrito}
        onClose={() => irARuta('/')}
        onQuitar={quitarDelCarrito}
        onVaciar={vaciarCarrito}
        onCheckout={() => irARuta('/checkout')}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
