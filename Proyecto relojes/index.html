/* ══════════════════════════════════════════════════
   TARJETAS — tabla de indicadores (deteccion por prefijo/BIN, sin API, segura para demos)
══════════════════════════════════════════════════ */
const TARJETAS = [
  { marca: 'Visa',       patron: /^4/,               formato: [4, 4, 4, 4], largo: 16, cvv: 3, color: '#1a1f71', indicador: 'Empieza con 4',        demo: '4242 4242 4242 4242' },
  { marca: 'Mastercard', patron: /^(5[1-5]|2[2-7])/, formato: [4, 4, 4, 4], largo: 16, cvv: 3, color: '#eb001b', indicador: '51–55 o 2221–2720',    demo: '5555 5555 5555 4444' },
  { marca: 'Amex',       patron: /^3[47]/,           formato: [4, 6, 5],    largo: 15, cvv: 4, color: '#2e77bc', indicador: '34 o 37',              demo: '3782 822463 10005' },
];
function detectarMarca(valor) {
  const d = (valor || '').replace(/\D/g, '');
  return TARJETAS.find(t => t.patron.test(d)) || null;
}
function formatearTarjeta(valor) {
  const marca = detectarMarca(valor);
  const largo = marca ? marca.largo : 16;
  const digitos = (valor || '').replace(/\D/g, '').slice(0, largo);
  const grupos = marca ? marca.formato : [4, 4, 4, 4];
  let out = '', idx = 0;
  for (const g of grupos) {
    if (idx >= digitos.length) break;
    out += (out ? ' ' : '') + digitos.slice(idx, idx + g);
    idx += g;
  }
  if (idx < digitos.length) out += (out ? ' ' : '') + digitos.slice(idx);
  return out;
}
// Algoritmo de Luhn: valida el formato del numero (atrapa errores de tipeo)
function luhnValido(valor) {
  const d = (valor || '').replace(/\D/g, '');
  if (d.length < 13) return false;
  let suma = 0, alt = false;
  for (let i = d.length - 1; i >= 0; i--) {
    let n = parseInt(d[i], 10);
    if (alt) { n *= 2; if (n > 9) n -= 9; }
    suma += n; alt = !alt;
  }
  return suma % 10 === 0;
}
// Formatea el vencimiento a MM/AA en vivo (ej: 0828 -> 08/28)
function formatearVence(valor) {
  const d = (valor || '').replace(/\D/g, '').slice(0, 4);
  if (d.length <= 2) return d;
  return d.slice(0, 2) + '/' + d.slice(2);
}

/* ══════════════════════════════════════════════════
   CHECKOUT — pasos de la compra (datos, envio, pago, resumen)
══════════════════════════════════════════════════ */
function CheckoutPage({ items, usuario, onVolver, onConfirmado }) {
  const subtotal = items.reduce((s, i) => s + i.precio * i.cantidad, 0);
  const unidades = items.reduce((s, i) => s + i.cantidad, 0);
  const [paso, setPaso]         = React.useState(1);
  const [cupon, setCupon]       = React.useState(null);
  const [cuponInput, setCuponInput] = React.useState('');
  const [cuponMsg, setCuponMsg] = React.useState(null);
  const [enviando, setEnviando] = React.useState(false);
  const [error, setError]       = React.useState(null);
  const [form, setForm] = React.useState({
    nombreCliente: usuario?.nombre || '', apellidoCliente: usuario?.apellido || '',
    email: usuario?.email || '', telefono: usuario?.telefono || '',
    direccion: usuario?.direccion || '', ciudad: '', provincia: '', codigoPostal: '', referencia: '',
    metodoPago: 'Contra entrega', tarjetaNumero: '', tarjetaVence: '', tarjetaCvv: '',
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Deteccion de marca de la tarjeta (en vivo). Para el demo basta con la cantidad correcta de digitos.
  const marcaT = detectarMarca(form.tarjetaNumero);
  const digitosTar = form.tarjetaNumero.replace(/\D/g, '');
  const numCompleto = marcaT && digitosTar.length === marcaT.largo;

  // Totales: cupon, ITBIS 18%, envio (RD$200 en DN/SD; fuera se cotiza aparte)
  const descuento = cupon ? (cupon.tipo === 'porcentaje' ? subtotal * cupon.valor / 100 : Math.min(cupon.valor, subtotal)) : 0;
  const provinciaDN = ['distrito nacional', 'santo domingo'].includes((form.provincia || '').trim().toLowerCase());
  const envio = provinciaDN ? 200 : 0;
  const cotizarEnvio = form.provincia && !provinciaDN;
  const baseGravable = subtotal - descuento;
  const itbis = Math.round(baseGravable * 0.18 * 100) / 100;
  const totalFinal = baseGravable + itbis + envio;
  const aplicarCupon = async () => {
    setCuponMsg(null);
    if (!cuponInput.trim()) return;
    try {
      const r = await fetch(`${API}/api/cupon/validar/${encodeURIComponent(cuponInput.trim())}`);
      if (!r.ok) throw new Error();
      const c = await r.json(); setCupon(c); setCuponMsg({ ok: true, texto: `Cupon "${c.codigo}" aplicado` });
    } catch (e) { setCupon(null); setCuponMsg({ ok: false, texto: 'Cupon invalido o expirado' }); }
  };

  const pasos = ['Datos', 'Envio', 'Pago', 'Resumen'];
  const validar = () => {
    if (paso === 1) return form.nombreCliente && form.apellidoCliente && form.email && form.telefono;
    if (paso === 2) return form.direccion && form.ciudad && form.provincia;
    if (paso === 3) return form.metodoPago !== 'Tarjeta' || (numCompleto && form.tarjetaVence.length >= 4 && form.tarjetaCvv.length >= 3);
    return true;
  };
  const siguiente = () => { if (!validar()) { setError('Completa los campos requeridos.'); return; } setError(null); setPaso(p => Math.min(4, p + 1)); };
  const anterior  = () => { setError(null); setPaso(p => Math.max(1, p - 1)); };

  const confirmar = async () => {
    setEnviando(true); setError(null);
    try {
      const payload = {
        nombreCliente: form.nombreCliente, apellidoCliente: form.apellidoCliente, email: form.email, telefono: form.telefono,
        direccion: form.direccion, ciudad: form.ciudad, provincia: form.provincia, codigoPostal: form.codigoPostal, referencia: form.referencia,
        metodoPago: form.metodoPago, cuponCodigo: cupon ? cupon.codigo : null, usuarioId: usuario?.id || null,
        items: items.map(i => ({ relojId: i.relojId, movimientoId: i.movimientoId, tipoPulseraId: i.tipoPulseraId, cantidad: i.cantidad })),
      };
      const r = await fetch(`${API}/api/pedido`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'No se pudo crear el pedido');
      onConfirmado(d);
    } catch (err) { setError(err.message); }
    finally { setEnviando(false); }
  };

  const inp = { width: '100%', padding: '11px 13px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 6 };
  const field = (label, node) => <div style={{ marginBottom: 14 }}><label style={lbl}>{label}</label>{node}</div>;

  return (
    <div style={{ minHeight: '100vh', background: 'var(--off-white)', fontFamily: 'var(--sans)' }}>
      {/* Barra superior */}
      <div style={{ background: 'var(--white)', borderBottom: '1px solid var(--border)', padding: '0 48px', height: 66, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <Emblem size={30} fg="var(--gold)" />
          <div style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 600, color: 'var(--ink)' }}>Finalizar compra</div>
        </div>
        <button onClick={onVolver} style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, padding: '8px 18px', cursor: 'pointer' }}>← Volver al carrito</button>
      </div>

      {items.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '90px 24px', color: 'var(--ink-4)' }}>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16, opacity: 0.5 }}><Emblem size={48} fg="var(--border-dk)" /></div>
          <p style={{ fontSize: 14, marginBottom: 20 }}>Tu carrito esta vacio.</p>
          <button onClick={onVolver} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, padding: '12px 28px', cursor: 'pointer' }}>Volver</button>
        </div>
      ) : (
        <div className="col2" style={{ maxWidth: 1000, margin: '0 auto', padding: '36px 48px', display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 32, alignItems: 'start' }}>

          {/* Columna izquierda: pasos */}
          <div>
            {/* Stepper */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 28 }}>
              {pasos.map((p, i) => {
                const n = i + 1, activo = paso === n, hecho = paso > n;
                return (
                  <div key={p} style={{ flex: 1, textAlign: 'center' }}>
                    <div style={{ height: 3, borderRadius: 2, background: (activo || hecho) ? 'var(--gold)' : 'var(--border)', marginBottom: 8 }} />
                    <span style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: (activo || hecho) ? 'var(--ink)' : 'var(--ink-4)' }}>{n}. {p}</span>
                  </div>
                );
              })}
            </div>

            <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '28px 30px' }}>
              {error && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 16, fontSize: 12, background: '#fff5f5', border: '1px solid #fecaca', color: '#dc2626' }}>{error}</div>}

              {/* Paso 1: datos personales */}
              {paso === 1 && (<>
                <h3 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>Datos personales</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {field('Nombre', <input value={form.nombreCliente} onChange={e => set('nombreCliente', e.target.value)} placeholder="Carlos" style={inp} />)}
                  {field('Apellido', <input value={form.apellidoCliente} onChange={e => set('apellidoCliente', e.target.value)} placeholder="Martinez" style={inp} />)}
                </div>
                {field('Correo electronico', <input type="email" value={form.email} onChange={e => set('email', e.target.value)} placeholder="correo@email.com" style={inp} />)}
                {field('Telefono', <input value={form.telefono} onChange={e => set('telefono', e.target.value)} placeholder="809-555-0101" style={inp} />)}
              </>)}

              {/* Paso 2: envio */}
              {paso === 2 && (<>
                <h3 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>Direccion de envio</h3>
                {field('Direccion', <input value={form.direccion} onChange={e => set('direccion', e.target.value)} placeholder="Av. Winston Churchill 45" style={inp} />)}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {field('Ciudad', <input value={form.ciudad} onChange={e => set('ciudad', e.target.value)} placeholder="Santo Domingo" style={inp} />)}
                  {field('Provincia', <select value={form.provincia} onChange={e => set('provincia', e.target.value)} required style={inp}>
                    <option value="">Selecciona</option>
                    <option>Distrito Nacional</option>
                    <option>Santo Domingo</option>
                    <option>Santiago</option>
                    <option>La Vega</option>
                    <option>Puerto Plata</option>
                    <option>San Cristobal</option>
                    <option>La Altagracia</option>
                    <option>San Pedro de Macoris</option>
                    <option>Otra</option>
                  </select>)}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 12 }}>
                  {field('Codigo postal', <input value={form.codigoPostal} onChange={e => set('codigoPostal', e.target.value)} placeholder="10101" style={inp} />)}
                  {field('Referencia (opcional)', <input value={form.referencia} onChange={e => set('referencia', e.target.value)} placeholder="Casa azul, porton negro" style={inp} />)}
                </div>
              </>)}

              {/* Paso 3: pago */}
              {paso === 3 && (<>
                <h3 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>Metodo de pago</h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 8 }}>
                  {['Contra entrega', 'Transferencia', 'Tarjeta'].map(m => (
                    <label key={m} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', borderRadius: 6, cursor: 'pointer', background: form.metodoPago === m ? 'var(--gold-bg)' : 'var(--white)', border: `1px solid ${form.metodoPago === m ? 'var(--gold-lt)' : 'var(--border)'}` }}>
                      <input type="radio" name="pago" checked={form.metodoPago === m} onChange={() => set('metodoPago', m)} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>{m}</span>
                    </label>
                  ))}
                </div>
                {form.metodoPago === 'Tarjeta' && (
                  <div style={{ marginTop: 14 }}>
                    <label style={lbl}>Numero de tarjeta</label>
                    <div style={{ position: 'relative', marginBottom: 6 }}>
                      <input value={form.tarjetaNumero} onChange={e => set('tarjetaNumero', formatearTarjeta(e.target.value))} placeholder="0000 0000 0000 0000" style={{ ...inp, paddingRight: 92, fontFamily: 'var(--mono)', letterSpacing: '0.08em' }} />
                      <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)' }}>
                        {marcaT
                          ? <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--white)', background: marcaT.color, padding: '4px 8px', borderRadius: 4 }}>{marcaT.marca}</span>
                          : null}
                      </span>
                    </div>
                    {form.tarjetaNumero && (
                      <div style={{ fontSize: 10, marginBottom: 12, letterSpacing: '0.06em', color: numCompleto ? 'var(--gold)' : 'var(--ink-4)' }}>
                        {numCompleto ? 'Numero completo' : `Faltan digitos (${digitosTar.length}/${marcaT ? marcaT.largo : 16})`}
                      </div>
                    )}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                      {field('Vence (MM/AA)', <input value={form.tarjetaVence} onChange={e => set('tarjetaVence', formatearVence(e.target.value))} placeholder="MM/AA" maxLength={5} style={inp} />)}
                      {field(`CVV (${marcaT ? marcaT.cvv : 3} dig.)`, <input value={form.tarjetaCvv} onChange={e => set('tarjetaCvv', e.target.value.replace(/\D/g, '').slice(0, marcaT ? marcaT.cvv : 4))} placeholder={marcaT && marcaT.cvv === 4 ? '1234' : '123'} style={inp} />)}
                    </div>
                  </div>
                )}
              </>)}

              {/* Paso 4: resumen */}
              {paso === 4 && (<>
                <h3 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>Revisa y confirma</h3>
                <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.9 }}>
                  <div><strong style={{ color: 'var(--ink)' }}>{form.nombreCliente} {form.apellidoCliente}</strong> · {form.email} · {form.telefono}</div>
                  <div>{form.direccion}, {form.ciudad}, {form.provincia} {form.codigoPostal}</div>
                  {form.referencia && <div style={{ color: 'var(--ink-4)' }}>Ref: {form.referencia}</div>}
                  <div style={{ marginTop: 6 }}>Pago: <strong style={{ color: 'var(--ink)' }}>{form.metodoPago}</strong></div>
                </div>
              </>)}

              {/* Navegacion de pasos */}
              <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
                {paso > 1 && <button onClick={anterior} style={{ flex: 1, padding: '12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer' }}>Atras</button>}
                {paso < 4
                  ? <button onClick={siguiente} style={{ flex: 2, padding: '12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Continuar</button>
                  : <button onClick={confirmar} disabled={enviando} style={{ flex: 2, padding: '12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: enviando ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: enviando ? 'not-allowed' : 'pointer' }}>{enviando ? 'Procesando...' : 'Confirmar pedido'}</button>}
              </div>
            </div>
          </div>

          {/* Columna derecha: resumen del pedido */}
          <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '24px 26px', position: 'sticky', top: 90 }}>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 16 }}>Tu pedido ({unidades} pza)</div>
            {items.map(i => (
              <div key={i.key} style={{ display: 'flex', justifyContent: 'space-between', gap: 10, padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
                <div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 14, fontWeight: 600, color: 'var(--ink)' }}>{i.relojNombre}</div>
                  <div style={{ fontSize: 10, color: 'var(--ink-4)' }}>{i.maquina} · {i.pulsera} · x{i.cantidad}</div>
                </div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: 'var(--ink)', whiteSpace: 'nowrap' }}>RD$ {(i.precio * i.cantidad).toLocaleString('es-DO')}</div>
              </div>
            ))}
            {/* Cupon */}
            <div style={{ display: 'flex', gap: 8, margin: '16px 0 6px' }}>
              <input value={cuponInput} onChange={e => setCuponInput(e.target.value)} placeholder="Cupon de descuento" style={{ flex: 1, padding: '9px 11px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 12, fontFamily: 'var(--mono)', textTransform: 'uppercase', outline: 'none' }} />
              <button type="button" onClick={aplicarCupon} style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, padding: '0 14px', cursor: 'pointer' }}>Aplicar</button>
            </div>
            {cuponMsg && <div style={{ fontSize: 10, marginBottom: 8, color: cuponMsg.ok ? '#2D6A4F' : 'var(--rose)' }}>{cuponMsg.texto}</div>}

            {/* Desglose */}
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, marginTop: 6, fontSize: 12.5, color: 'var(--ink-2)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0' }}><span>Subtotal</span><span style={{ fontFamily: 'var(--mono)' }}>RD$ {subtotal.toLocaleString('es-DO')}</span></div>
              {descuento > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', color: '#2D6A4F' }}><span>Descuento ({cupon.codigo})</span><span style={{ fontFamily: 'var(--mono)' }}>− RD$ {descuento.toLocaleString('es-DO')}</span></div>}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0' }}><span>ITBIS (18%)</span><span style={{ fontFamily: 'var(--mono)' }}>RD$ {itbis.toLocaleString('es-DO')}</span></div>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0' }}><span>Envio</span><span style={{ fontFamily: 'var(--mono)' }}>{cotizarEnvio ? 'A cotizar' : `RD$ ${envio.toLocaleString('es-DO')}`}</span></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)' }}>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Total</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 20, fontWeight: 600, color: 'var(--ink)' }}>RD$ {totalFinal.toLocaleString('es-DO')}</span>
            </div>
            {cotizarEnvio && <div style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6 }}>* El envio fuera del Distrito Nacional / Santo Domingo se cotiza aparte.</div>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CONFIRMACION — pedido creado con exito
══════════════════════════════════════════════════ */
function ConfirmacionPage({ pedido, onVolver }) {
  return (
    <div style={{ minHeight: '100vh', background: 'var(--off-white)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, fontFamily: 'var(--sans)' }}>
      <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 16, padding: '48px 44px', maxWidth: 560, width: '100%', boxShadow: '0 16px 48px rgba(0,0,0,0.08)' }}>
        {!pedido ? (
          <div style={{ textAlign: 'center' }}>
            <p style={{ fontSize: 14, color: 'var(--ink-3)', marginBottom: 20 }}>No hay un pedido reciente para mostrar.</p>
            <button onClick={onVolver} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, padding: '12px 28px', cursor: 'pointer' }}>Ir a la tienda</button>
          </div>
        ) : (<>
          <div style={{ textAlign: 'center', marginBottom: 24 }}>
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 18 }}><Emblem size={52} fg="var(--gold)" flag={true} /></div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 28, fontWeight: 600, color: 'var(--ink)', marginBottom: 6 }}>¡Pedido confirmado!</h2>
            <p style={{ fontSize: 13, color: 'var(--ink-3)' }}>Gracias, {pedido.nombreCliente}. Tu pedido <strong style={{ color: 'var(--ink)' }}>#{pedido.id}</strong> fue registrado.</p>
          </div>

          <div style={{ background: 'var(--off-white)', borderRadius: 10, padding: '18px 20px', marginBottom: 20 }}>
            {pedido.items.map(i => (
              <div key={i.id} style={{ display: 'flex', justifyContent: 'space-between', gap: 10, padding: '6px 0', fontSize: 12.5, color: 'var(--ink-2)' }}>
                <span>{i.relojNombre} <span style={{ color: 'var(--ink-4)' }}>({i.maquinaNombre} · {i.pulseraNombre}) x{i.cantidad}</span></span>
                <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, color: 'var(--ink)' }}>RD$ {i.subtotal.toLocaleString('es-DO')}</span>
              </div>
            ))}
            <div style={{ borderTop: '1px solid var(--border)', marginTop: 8, paddingTop: 10, fontSize: 12, color: 'var(--ink-3)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}><span>Subtotal</span><span style={{ fontFamily: 'var(--mono)' }}>RD$ {pedido.subtotal.toLocaleString('es-DO')}</span></div>
              {pedido.descuento > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', color: '#2D6A4F' }}><span>Descuento{pedido.cuponCodigo ? ` (${pedido.cuponCodigo})` : ''}</span><span style={{ fontFamily: 'var(--mono)' }}>− RD$ {pedido.descuento.toLocaleString('es-DO')}</span></div>}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}><span>ITBIS (18%)</span><span style={{ fontFamily: 'var(--mono)' }}>RD$ {pedido.itbis.toLocaleString('es-DO')}</span></div>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}><span>Envio</span><span style={{ fontFamily: 'var(--mono)' }}>{pedido.envio > 0 ? `RD$ ${pedido.envio.toLocaleString('es-DO')}` : 'A cotizar'}</span></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: '1px solid var(--border)', marginTop: 8, paddingTop: 10 }}>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Total</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 16, fontWeight: 700, color: 'var(--ink)' }}>RD$ {pedido.total.toLocaleString('es-DO')}</span>
            </div>
          </div>

          <div style={{ fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.8, marginBottom: 24 }}>
            <div style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Envio a</div>
            {pedido.direccion}, {pedido.ciudad}, {pedido.provincia} {pedido.codigoPostal}<br />
            Pago: {pedido.metodoPago} · Estado: {pedido.estado}
          </div>

          <button onClick={onVolver} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Seguir comprando</button>
        </>)}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PERFIL DEL CLIENTE — datos, pedidos (con estatus) y tarjetas guardadas
══════════════════════════════════════════════════ */
const estadoColor = (e) => e === 'Completado' ? '#2D6A4F' : e === 'Cancelado' ? '#B23838' : e === 'Enviado' ? '#1B3461' : e === 'En proceso' ? '#A8862C' : 'var(--ink-3)';

function PerfilPage({ usuario, onActualizar, onVolver, onLogout }) {
  const [tab, setTab] = React.useState('datos');
  const inp = { width: '100%', padding: '11px 13px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 6 };
  const field = (label, node) => <div style={{ marginBottom: 14 }}><label style={lbl}>{label}</label>{node}</div>;

  // ---- Mis datos ----
  const [form, setForm] = React.useState({ nombre: usuario.nombre || '', apellido: usuario.apellido || '', telefono: usuario.telefono || '', direccion: usuario.direccion || '', dobleFactor: usuario.dobleFactor || false });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const [msgDatos, setMsgDatos] = React.useState(null);
  const guardarDatos = async (e) => {
    e.preventDefault(); setMsgDatos(null);
    try {
      const r = await fetch(`${API}/api/usuario/${usuario.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre: form.nombre, apellido: form.apellido, telefono: form.telefono, direccion: form.direccion, dobleFactor: form.dobleFactor }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al guardar');
      onActualizar(d);
      setMsgDatos({ ok: true, texto: 'Perfil actualizado' });
    } catch (err) { setMsgDatos({ ok: false, texto: err.message }); }
  };

  // ---- Cambiar contrasena ----
  const [pwForm, setPwForm] = React.useState({ actual: '', nueva: '', repetir: '' });
  const pwset = (k, v) => setPwForm(f => ({ ...f, [k]: v }));
  const [msgPw, setMsgPw] = React.useState(null);
  const cambiarPassword = async (e) => {
    e.preventDefault(); setMsgPw(null);
    const errPwd = validarPassword(pwForm.nueva);
    if (errPwd) { setMsgPw({ ok: false, texto: errPwd }); return; }
    if (pwForm.nueva !== pwForm.repetir) { setMsgPw({ ok: false, texto: 'Las contrasenas no coinciden' }); return; }
    try {
      const r = await fetch(`${API}/api/usuario/${usuario.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre: form.nombre, apellido: form.apellido, telefono: form.telefono, direccion: form.direccion, dobleFactor: form.dobleFactor, password: pwForm.nueva, passwordActual: pwForm.actual }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al cambiar la contrasena');
      onActualizar(d); setPwForm({ actual: '', nueva: '', repetir: '' });
      setMsgPw({ ok: true, texto: 'Contrasena actualizada' });
    } catch (err) { setMsgPw({ ok: false, texto: err.message }); }
  };

  // ---- Mis pedidos ----
  const [pedidos, setPedidos] = React.useState([]);
  const [cargandoP, setCargandoP] = React.useState(false);
  const [filtro, setFiltro] = React.useState('Todos');
  const [abierto, setAbierto] = React.useState(null);
  const cargarPedidos = () => { setCargandoP(true); fetch(`${API}/api/pedido?usuarioId=${usuario.id}`).then(r => r.json()).then(d => { setPedidos(d); setCargandoP(false); }).catch(() => setCargandoP(false)); };
  React.useEffect(() => { if (tab === 'pedidos') cargarPedidos(); }, [tab]);
  const pedidosFiltrados = filtro === 'Todos' ? pedidos : pedidos.filter(p => p.estado === filtro);

  // ---- Mis tarjetas ----
  const [tarjetas, setTarjetas] = React.useState([]);
  const [tForm, setTForm] = React.useState({ numero: '', titular: '', vence: '', cvv: '' });
  const [msgT, setMsgT] = React.useState(null);
  const tset = (k, v) => setTForm(f => ({ ...f, [k]: v }));
  const marcaTar = detectarMarca(tForm.numero);
  const cargarTarjetas = () => { fetch(`${API}/api/tarjeta?usuarioId=${usuario.id}`).then(r => r.json()).then(setTarjetas).catch(() => {}); };
  React.useEffect(() => { if (tab === 'tarjetas') cargarTarjetas(); }, [tab]);
  const guardarTarjeta = async (e) => {
    e.preventDefault(); setMsgT(null);
    const digitos = tForm.numero.replace(/\D/g, '');
    if (!marcaTar || digitos.length !== marcaTar.largo) { setMsgT({ ok: false, texto: `El numero debe tener ${marcaTar ? marcaTar.largo : 16} digitos` }); return; }
    try {
      const payload = { usuarioId: usuario.id, marca: marcaTar.marca, ultimos4: digitos.slice(-4), vence: tForm.vence, titular: tForm.titular };
      const r = await fetch(`${API}/api/tarjeta`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error('Error al guardar');
      setTForm({ numero: '', titular: '', vence: '', cvv: '' }); setMsgT({ ok: true, texto: 'Tarjeta guardada' }); cargarTarjetas();
    } catch (err) { setMsgT({ ok: false, texto: err.message }); }
  };
  const borrarTarjeta = async (id) => { await fetch(`${API}/api/tarjeta/${id}`, { method: 'DELETE' }); cargarTarjetas(); };

  // ---- Soporte (tickets del cliente) ----
  const [tickets, setTickets]         = React.useState([]);
  const [ticketForm, setTicketForm]   = React.useState({ pedidoId: '', asunto: '', descripcion: '', prioridad: 'Media', imagenUrl: '' });
  const [ticketPrev, setTicketPrev]   = React.useState(null);
  const [msgTicket, setMsgTicket]     = React.useState(null);
  const [abiertoTicket, setAbiertoTicket] = React.useState(null);
  const tkset = (k, v) => setTicketForm(f => ({ ...f, [k]: v }));
  const cargarTickets = () => fetch(`${API}/api/ticket?usuarioId=${usuario.id}`).then(r => r.json()).then(setTickets).catch(() => {});
  React.useEffect(() => { if (tab === 'soporte') { cargarTickets(); if (pedidos.length === 0) cargarPedidos(); } }, [tab]);
  const subirTicket = async (file) => { const fd = new FormData(); fd.append('archivo', file); const r = await fetch(`${API}/api/upload`, { method: 'POST', body: fd }); if (!r.ok) throw new Error(); return (await r.json()).url; };
  const crearTicket = async (e) => {
    e.preventDefault(); setMsgTicket(null);
    try {
      const payload = { usuarioId: usuario.id, nombreCliente: `${usuario.nombre} ${usuario.apellido}`, email: usuario.email, pedidoId: ticketForm.pedidoId ? parseInt(ticketForm.pedidoId) : null, asunto: ticketForm.asunto, descripcion: ticketForm.descripcion, prioridad: ticketForm.prioridad, imagenUrl: ticketForm.imagenUrl || null };
      const r = await fetch(`${API}/api/ticket`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error('Error al crear el ticket');
      setTicketForm({ pedidoId: '', asunto: '', descripcion: '', prioridad: 'Media', imagenUrl: '' }); setTicketPrev(null);
      setMsgTicket({ ok: true, texto: 'Ticket enviado. Te responderemos por aqui.' }); cargarTickets();
    } catch (err) { setMsgTicket({ ok: false, texto: err.message }); }
  };

  // ---- Favoritos ----
  const [favoritos, setFavoritos] = React.useState([]);
  const cargarFavoritos = () => fetch(`${API}/api/favorito?usuarioId=${usuario.id}`).then(r => r.json()).then(setFavoritos).catch(() => {});
  React.useEffect(() => { if (tab === 'favoritos') cargarFavoritos(); }, [tab]);
  const quitarFavorito = async (relojId) => { await fetch(`${API}/api/favorito?usuarioId=${usuario.id}&relojId=${relojId}`, { method: 'DELETE' }); cargarFavoritos(); };

  const tabBtn = (id, label) => (
    <button onClick={() => setTab(id)} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'none', border: 'none', cursor: 'pointer', padding: '12px 4px', color: tab === id ? 'var(--ink)' : 'var(--ink-4)', borderBottom: tab === id ? '2px solid var(--gold)' : '2px solid transparent', marginBottom: -1 }}>{label}</button>
  );

  return (
    <div style={{ minHeight: '100vh', background: 'var(--off-white)', fontFamily: 'var(--sans)' }}>
      {/* Barra superior */}
      <div style={{ background: 'var(--white)', borderBottom: '1px solid var(--border)', padding: '0 48px', height: 66, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <Emblem size={30} fg="var(--gold)" />
          <div style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 600, color: 'var(--ink)' }}>Mi Perfil</div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onVolver} style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, padding: '8px 18px', cursor: 'pointer' }}>← Tienda</button>
          <button onClick={onLogout} style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--rose)', border: '1px solid rgba(176,112,85,0.35)', borderRadius: 3, padding: '8px 18px', cursor: 'pointer' }}>Cerrar sesion</button>
        </div>
      </div>

      <div style={{ maxWidth: 860, margin: '0 auto', padding: '36px 48px' }}>
        <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Cuenta</div>
        <h1 style={{ fontFamily: 'var(--serif)', fontSize: 34, fontWeight: 600, color: 'var(--ink)', marginBottom: 6 }}>Hola, {usuario.nombre}</h1>
        <div style={{ fontSize: 12, color: 'var(--ink-4)', marginBottom: 20 }}>{usuario.email}</div>

        {/* Pestanas */}
        <div style={{ display: 'flex', gap: 22, borderBottom: '1px solid var(--border)', marginBottom: 26 }}>
          {tabBtn('datos', 'Mis datos')}
          {tabBtn('pedidos', 'Mis pedidos')}
          {tabBtn('tarjetas', 'Mis tarjetas')}
          {tabBtn('favoritos', 'Favoritos')}
          {tabBtn('soporte', 'Soporte')}
        </div>

        {/* ---- Datos ---- */}
        {tab === 'datos' && (
          <div style={{ maxWidth: 560 }}>
            {/* Datos personales */}
            <form onSubmit={guardarDatos} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '28px 30px', marginBottom: 20 }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>Datos personales</div>
              {msgDatos && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 16, fontSize: 12, background: msgDatos.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msgDatos.ok ? '#bbf7d0' : '#fecaca'}`, color: msgDatos.ok ? '#166534' : '#dc2626' }}>{msgDatos.texto}</div>}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {field('Nombre', <input value={form.nombre} onChange={e => set('nombre', e.target.value)} required style={inp} />)}
                {field('Apellido', <input value={form.apellido} onChange={e => set('apellido', e.target.value)} required style={inp} />)}
              </div>
              {field('Correo (no editable)', <input value={usuario.email} disabled style={{ ...inp, background: 'var(--off-white)', color: 'var(--ink-4)' }} />)}
              {field('Telefono', <input value={form.telefono} onChange={e => set('telefono', e.target.value)} placeholder="809-555-0101" style={inp} />)}
              {field('Direccion', <input value={form.direccion} onChange={e => set('direccion', e.target.value)} placeholder="Av. Winston Churchill, SD" style={inp} />)}
              <label style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '2px 0 16px', cursor: 'pointer' }}>
                <input type="checkbox" checked={form.dobleFactor} onChange={e => set('dobleFactor', e.target.checked)} />
                <span style={{ fontSize: 12, color: 'var(--ink-2)' }}>Verificacion en dos pasos (2FA): recibir un codigo al iniciar sesion</span>
              </label>
              <button type="submit" style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer', marginTop: 6 }}>Guardar cambios</button>
            </form>

            {/* Cambiar contrasena */}
            <form onSubmit={cambiarPassword} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '28px 30px' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>Cambiar contrasena</div>
              {msgPw && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 16, fontSize: 12, background: msgPw.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msgPw.ok ? '#bbf7d0' : '#fecaca'}`, color: msgPw.ok ? '#166534' : '#dc2626' }}>{msgPw.texto}</div>}
              {field('Contrasena actual', <PasswordInput value={pwForm.actual} onChange={e => pwset('actual', e.target.value)} required style={inp} />)}
              {field('Nueva contrasena', <PasswordInput value={pwForm.nueva} onChange={e => pwset('nueva', e.target.value)} required style={inp} />)}
              {field('Repetir contrasena', <PasswordInput value={pwForm.repetir} onChange={e => pwset('repetir', e.target.value)} required style={inp} />)}
              <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.6, background: 'var(--off-white)', borderRadius: 8, padding: '11px 13px', marginBottom: 14 }}>
                <strong style={{ color: 'var(--ink)' }}>Requisitos:</strong> la contrasena debe tener al menos <strong>8 caracteres</strong>, con una letra <strong>mayuscula</strong>, una <strong>minuscula</strong> y un <strong>numero</strong>. Evita datos personales o contrasenas repetidas.
              </div>
              <button type="submit" style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Actualizar contrasena</button>
            </form>
          </div>
        )}

        {/* ---- Pedidos ---- */}
        {tab === 'pedidos' && (
          <div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
              {['Todos', 'Pendiente', 'En proceso', 'Enviado', 'Completado'].map(f => (
                <button key={f} onClick={() => setFiltro(f)} style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '7px 14px', borderRadius: 9999, cursor: 'pointer', background: filtro === f ? 'var(--ink)' : 'transparent', color: filtro === f ? 'var(--white)' : 'var(--ink-3)', border: filtro === f ? '1px solid var(--ink)' : '1px solid var(--border-dk)' }}>{f}</button>
              ))}
            </div>
            {cargandoP ? <div style={{ textAlign: 'center', padding: 40, color: 'var(--ink-4)' }}>Cargando...</div>
              : pedidosFiltrados.length === 0 ? <div style={{ textAlign: 'center', padding: 50, color: 'var(--ink-4)', fontSize: 13, background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12 }}>No tienes pedidos {filtro !== 'Todos' ? `en estado "${filtro}"` : 'todavia'}.</div>
              : pedidosFiltrados.map(p => (
                <div key={p.id} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, marginBottom: 10, overflow: 'hidden' }}>
                  <div onClick={() => setAbierto(abierto === p.id ? null : p.id)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 18px', cursor: 'pointer' }}>
                    <div>
                      <span style={{ fontFamily: 'var(--serif)', fontSize: 16, fontWeight: 600, color: 'var(--ink)' }}>Pedido #{p.id}</span>
                      <span style={{ fontSize: 11, color: 'var(--ink-4)', marginLeft: 10 }}>{new Date(p.fecha).toLocaleDateString('es-DO')}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '4px 11px', borderRadius: 9999, color: 'var(--white)', background: estadoColor(p.estado) }}>{p.estado}</span>
                      <span style={{ fontFamily: 'var(--mono)', fontSize: 14, fontWeight: 600, color: 'var(--ink)' }}>RD$ {p.total.toLocaleString('es-DO')}</span>
                    </div>
                  </div>
                  {abierto === p.id && (
                    <div style={{ padding: '0 18px 16px', fontSize: 12, color: 'var(--ink-2)' }}>
                      {p.items.map(i => <PedidoItemResena key={i.id} item={i} usuario={usuario} />)}
                      <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--ink-4)' }}>Envio: {p.direccion}, {p.ciudad}, {p.provincia} · Pago: {p.metodoPago}</div>
                    </div>
                  )}
                </div>
              ))}
          </div>
        )}

        {/* ---- Tarjetas ---- */}
        {tab === 'tarjetas' && (
          <div className="col2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>
            {/* Lista */}
            <div>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 12 }}>Guardadas</div>
              {tarjetas.length === 0 ? <p style={{ fontSize: 12, color: 'var(--ink-4)' }}>No tienes tarjetas guardadas.</p>
                : tarjetas.map(t => {
                  const m = TARJETAS.find(x => x.marca === t.marca);
                  return (
                    <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 12, background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px', marginBottom: 10 }}>
                      <span style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', color: 'var(--white)', background: m ? m.color : 'var(--ink-3)', padding: '4px 8px', borderRadius: 4 }}>{t.marca}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--ink)' }}>•••• {t.ultimos4}</div>
                        <div style={{ fontSize: 10, color: 'var(--ink-4)' }}>{t.titular} · vence {t.vence}</div>
                      </div>
                      <button onClick={() => borrarTarjeta(t.id)} style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', background: 'none', border: 'none', color: 'var(--rose)', cursor: 'pointer' }}>Eliminar</button>
                    </div>
                  );
                })}
            </div>
            {/* Agregar */}
            <form onSubmit={guardarTarjeta} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '22px 24px' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>Agregar tarjeta</div>
              {msgT && <div style={{ padding: '9px 12px', borderRadius: 6, marginBottom: 12, fontSize: 12, background: msgT.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msgT.ok ? '#bbf7d0' : '#fecaca'}`, color: msgT.ok ? '#166534' : '#dc2626' }}>{msgT.texto}</div>}
              <label style={lbl}>Numero</label>
              <div style={{ position: 'relative', marginBottom: 12 }}>
                <input value={tForm.numero} onChange={e => tset('numero', formatearTarjeta(e.target.value))} placeholder="0000 0000 0000 0000" style={{ ...inp, paddingRight: 88, fontFamily: 'var(--mono)' }} />
                <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)' }}>
                  {marcaTar ? <span style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', color: 'var(--white)', background: marcaTar.color, padding: '4px 8px', borderRadius: 4 }}>{marcaTar.marca}</span> : null}
                </span>
              </div>
              {field('Titular', <input value={tForm.titular} onChange={e => tset('titular', e.target.value)} placeholder="CLIENTE DEMO" style={inp} />)}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {field('Vence', <input value={tForm.vence} onChange={e => tset('vence', formatearVence(e.target.value))} placeholder="MM/AA" maxLength={5} style={inp} />)}
                {field('CVV (no se guarda)', <input value={tForm.cvv} onChange={e => tset('cvv', e.target.value.replace(/\D/g, '').slice(0, marcaTar ? marcaTar.cvv : 4))} placeholder="123" style={inp} />)}
              </div>
              <button type="submit" style={{ width: '100%', padding: '12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Guardar tarjeta</button>
              <p style={{ fontSize: 9.5, color: 'var(--ink-4)', marginTop: 8 }}>Solo se guarda marca, ultimos 4 digitos, vencimiento y titular.</p>
            </form>
          </div>
        )}

        {/* ---- Soporte (tickets) ---- */}
        {tab === 'soporte' && (
          <div className="col2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>
            <div>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 12 }}>Mis tickets</div>
              {tickets.length === 0 ? <p style={{ fontSize: 12, color: 'var(--ink-4)' }}>No tienes tickets todavia.</p>
                : tickets.map(t => (
                  <div key={t.id} onClick={() => setAbiertoTicket(t.id)} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', marginBottom: 8, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div><div style={{ fontFamily: 'var(--serif)', fontSize: 14, fontWeight: 600, color: 'var(--ink)' }}>{t.asunto}</div><div style={{ fontSize: 10, color: 'var(--ink-4)' }}>#{t.id}{t.pedidoId ? ` · Pedido #${t.pedidoId}` : ''} · {t.mensajes.length} msg</div></div>
                    <span style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '3px 9px', borderRadius: 9999, color: 'var(--white)', background: estadoTicketColor(t.estado) }}>{t.estado}</span>
                  </div>
                ))}
            </div>
            <form onSubmit={crearTicket} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '22px 24px' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>Reportar un problema</div>
              {msgTicket && <div style={{ padding: '9px 12px', borderRadius: 6, marginBottom: 12, fontSize: 12, background: msgTicket.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msgTicket.ok ? '#bbf7d0' : '#fecaca'}`, color: msgTicket.ok ? '#166534' : '#dc2626' }}>{msgTicket.texto}</div>}
              {field('Pedido (opcional)', <select value={ticketForm.pedidoId} onChange={e => tkset('pedidoId', e.target.value)} style={inp}><option value="">Sin pedido</option>{pedidos.map(p => <option key={p.id} value={p.id}>Pedido #{p.id} — RD$ {p.total.toLocaleString('es-DO')}</option>)}</select>)}
              {field('Asunto', <input value={ticketForm.asunto} onChange={e => tkset('asunto', e.target.value)} required placeholder="Problema con mi pedido" style={inp} />)}
              {field('Prioridad', <select value={ticketForm.prioridad} onChange={e => tkset('prioridad', e.target.value)} style={inp}><option>Baja</option><option>Media</option><option>Alta</option></select>)}
              {field('Descripcion', <textarea value={ticketForm.descripcion} onChange={e => tkset('descripcion', e.target.value)} required rows={3} placeholder="Explica el problema con detalle..." style={{ ...inp, resize: 'vertical' }} />)}
              {field('Imagen (opcional)', <label style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', border: '1px dashed var(--border-dk)', borderRadius: 4, cursor: 'pointer' }}>
                <input type="file" accept="image/*" onChange={async ev => { const f = ev.target.files[0]; if (f) { try { const url = await subirTicket(f); tkset('imagenUrl', url); setTicketPrev(URL.createObjectURL(f)); } catch (e) {} } }} style={{ display: 'none' }} />
                {ticketPrev ? <img src={ticketPrev} style={{ height: 40, objectFit: 'contain' }} /> : <span style={{ fontSize: 18, color: 'var(--ink-4)' }}>+</span>}
                <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>{ticketForm.imagenUrl ? 'Imagen lista' : 'Adjuntar foto'}</span>
              </label>)}
              <button type="submit" style={{ width: '100%', padding: '12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Enviar ticket</button>
            </form>
          </div>
        )}

        {/* ---- Favoritos ---- */}
        {tab === 'favoritos' && (
          <div>
            {favoritos.length === 0 ? <p style={{ fontSize: 13, color: 'var(--ink-4)' }}>No tienes favoritos. Marca relojes con el ♥ en el catalogo.</p>
              : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(210px,1fr))', gap: 14 }}>
                  {favoritos.map(r => {
                    const rese = r.resenas || [];
                    const rprom = rese.length ? rese.reduce((s, x) => s + x.calificacion, 0) / rese.length : 0;
                    return (
                      <div key={r.id} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
                        <div style={{ height: 130, background: 'var(--off-white)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          {getImageUrl(r.imagenUrl) ? <img src={getImageUrl(r.imagenUrl)} alt={r.nombre} style={{ maxHeight: 120, maxWidth: '85%', objectFit: 'contain' }} /> : <Emblem size={40} fg="var(--border-dk)" />}
                        </div>
                        <div style={{ padding: '12px 14px' }}>
                          <div style={{ fontSize: 7.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)' }}>{r.marca?.nombre || ''}</div>
                          <div style={{ fontFamily: 'var(--serif)', fontSize: 15, fontWeight: 600, color: 'var(--ink)', margin: '2px 0 4px' }}>{r.nombre}</div>
                          {rese.length > 0 && <div style={{ marginBottom: 4 }}><Estrellas valor={rprom} tam={11} /></div>}
                          <div style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: 'var(--ink-2)', marginBottom: 8 }}>RD$ {r.precio.toLocaleString('es-DO')}</div>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <button onClick={() => { window.location.hash = '#/producto/' + r.id; }} style={{ flex: 1, fontSize: 9, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, padding: '8px', cursor: 'pointer' }}>Ver</button>
                            <button onClick={() => quitarFavorito(r.id)} style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', background: 'transparent', color: 'var(--rose)', border: '1px solid rgba(176,112,85,0.35)', borderRadius: 3, padding: '8px 10px', cursor: 'pointer' }}>Quitar</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>}
          </div>
        )}
      </div>
      {abiertoTicket && <HiloTicket ticketId={abiertoTicket} autor={usuario.nombre} esSoporte={false} permiteEstado={false} onClose={() => setAbiertoTicket(null)} onCambio={cargarTickets} />}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   GARANTIA Y PREGUNTAS — pagina adicional (politica de garantia + FAQ)
══════════════════════════════════════════════════ */
function GarantiaPage({ onVolver }) {
  const [open, setOpen] = React.useState(null);

  const cobertura = [
    { item: 'Maquina / movimiento', ok: true },
    { item: 'Ensamblaje y mano de obra (servicio)', ok: true },
    { item: 'Esfera, agujas y marcadores', ok: true },
    { item: 'Cristal y corona', ok: false },
    { item: 'Pulsera / correa', ok: false },
    { item: 'Bateria (modelos de cuarzo)', ok: false },
    { item: 'Golpes, agua fuera de rango, uso indebido o desgaste normal', ok: false },
    { item: 'Manipulacion por terceros no autorizados', ok: false },
  ];
  const pasos = [
    ['01', 'Contactanos', 'Escribenos por WhatsApp o correo con tu numero de pedido y una descripcion del problema.'],
    ['02', 'Evaluacion', 'Envia la pieza a nuestro taller. Un tecnico la revisa y confirma si aplica la garantia (3 a 7 dias habiles).'],
    ['03', 'Reparacion o reemplazo', 'Reparamos sin costo la pieza o el servicio cubierto. Si no es reparable, la reemplazamos por un modelo igual o de valor equivalente.'],
  ];
  const faqs = [
    { q: '¿Que cubre la garantia?', a: 'Un (1) año completo desde la fecha de compra, en piezas y servicios (mano de obra), contra defectos de fabricacion del movimiento, la esfera, las agujas, los marcadores y el ensamblaje.' },
    { q: '¿Que NO cubre?', a: 'Cristal, corona, pulsera/correa y bateria; ni danos por golpes, accidentes, agua fuera de la resistencia indicada, uso indebido, desgaste normal o manipulacion por terceros no autorizados.' },
    { q: '¿Necesito la factura o comprobante?', a: 'Si. Necesitas el comprobante de compra o tu numero de pedido para validar la garantia.' },

/* ══════════════════════════════════════════════════
   FABRICACION (TALLER) — piezas, inventario de venta y publicar reloj
══════════════════════════════════════════════════ */
const CATEGORIAS_PIEZA = ['Case', 'Dial', 'Bezel', 'Aguja', 'Maquina', 'Pulsera'];

function FabricacionPage({ usuario, onVolver }) {
  const [tab, setTab] = React.useState('piezas');
  const inp = { width: '100%', padding: '10px 12px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 5 };
  const field = (label, node) => <div style={{ marginBottom: 12 }}>{label && <label style={lbl}>{label}</label>}{node}</div>;

  // Subir imagen (reutiliza /api/upload)
  const subirImagen = async (file) => {
    const fd = new FormData(); fd.append('archivo', file);
    const r = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
    if (!r.ok) throw new Error('Error al subir imagen');
    return (await r.json()).url;
  };

  // ---- Piezas ----
  const [piezas, setPiezas]   = React.useState([]);
  const [filtro, setFiltro]   = React.useState('Todas');
  const [pForm, setPForm]     = React.useState({ id: null, categoria: 'Case', nombre: '', tipo: '', color: '', material: '', stock: '', imagenUrl: '' });
  const [pPrev, setPPrev]     = React.useState(null);
  const [msgP, setMsgP]       = React.useState(null);
  const pset = (k, v) => setPForm(f => ({ ...f, [k]: v }));
  const cargarPiezas = () => { fetch(`${API}/api/pieza`).then(r => r.json()).then(setPiezas).catch(() => {}); };
  React.useEffect(() => { cargarPiezas(); }, []);
  const limpiarP = () => { setPForm({ id: null, categoria: 'Case', nombre: '', tipo: '', color: '', material: '', stock: '', imagenUrl: '' }); setPPrev(null); };
  const editarP = (p) => { setPForm({ id: p.id, categoria: p.categoria, nombre: p.nombre, tipo: p.tipo, color: p.color, material: p.material, stock: String(p.stock), imagenUrl: p.imagenUrl || '' }); setPPrev(p.imagenUrl ? getImageUrl(p.imagenUrl) : null); };
  const guardarPieza = async (e) => {
    e.preventDefault(); setMsgP(null);
    try {
      const payload = { ...pForm, stock: parseInt(pForm.stock || 0) };
      const url = pForm.id ? `${API}/api/pieza/${pForm.id}` : `${API}/api/pieza`;
      const method = pForm.id ? 'PUT' : 'POST';
      const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error('Error al guardar');
      setMsgP({ ok: true, texto: pForm.id ? 'Pieza actualizada' : 'Pieza agregada' }); limpiarP(); cargarPiezas();
    } catch (err) { setMsgP({ ok: false, texto: err.message }); }
  };
  const borrarPieza = async (id) => { await fetch(`${API}/api/pieza/${id}`, { method: 'DELETE' }); if (pForm.id === id) limpiarP(); cargarPiezas(); };
  const piezasFiltradas = filtro === 'Todas' ? piezas : piezas.filter(p => p.categoria === filtro);

  // ---- Inventario de venta (solo lectura) ----
  const [relojes, setRelojes] = React.useState([]);
  const [maquinas, setMaquinas] = React.useState([]);
  const [pulseras, setPulseras] = React.useState([]);
  React.useEffect(() => {
    if (tab === 'venta') {
      fetch(`${API}/api/reloj`).then(r => r.json()).then(setRelojes).catch(() => {});
      fetch(`${API}/api/movimiento`).then(r => r.json()).then(setMaquinas).catch(() => {});
      fetch(`${API}/api/tipopulsera`).then(r => r.json()).then(setPulseras).catch(() => {});
    }
  }, [tab]);

  // ---- Publicar reloj ----
  const [marcas, setMarcas] = React.useState([]);
  const [pub, setPub] = React.useState({ nombre: '', modelo: '', marcaId: '', precio: '', tipoModelo: 'Diver', cantidad: '1', imagenUrl: '' });
  const [pubPrev, setPubPrev] = React.useState(null);
  const [consumo, setConsumo] = React.useState({}); // { piezaId: cantidadPorReloj }
  const [msgPub, setMsgPub] = React.useState(null);
  const pubset = (k, v) => setPub(f => ({ ...f, [k]: v }));
  React.useEffect(() => { if (tab === 'publicar') { fetch(`${API}/api/marca`).then(r => r.json()).then(setMarcas).catch(() => {}); if (piezas.length === 0) cargarPiezas(); } }, [tab]);
  const toggleConsumo = (id) => setConsumo(c => { const n = { ...c }; if (n[id] != null) delete n[id]; else n[id] = 1; return n; });
  const setConsumoQty = (id, q) => setConsumo(c => ({ ...c, [id]: Math.max(1, parseInt(q || 1)) }));
  const publicar = async (e) => {
    e.preventDefault(); setMsgPub(null);
    const items = Object.keys(consumo).map(id => ({ piezaId: parseInt(id), cantidadPorReloj: consumo[id] }));
    if (items.length === 0) { setMsgPub({ ok: false, texto: 'Selecciona al menos una pieza a consumir' }); return; }
    try {
      const payload = { nombre: pub.nombre, modelo: pub.modelo, marcaId: parseInt(pub.marcaId), precio: parseFloat(pub.precio), tipoModelo: pub.tipoModelo, cantidad: parseInt(pub.cantidad || 1), imagenUrl: pub.imagenUrl || null, piezas: items };
      const r = await fetch(`${API}/api/fabricacion/publicar`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al publicar');
      setMsgPub({ ok: true, texto: `Publicado "${d.nombre}" (#${d.id}) x${pub.cantidad}. Piezas descontadas del taller.` });
      setPub({ nombre: '', modelo: '', marcaId: '', precio: '', tipoModelo: 'Diver', cantidad: '1', imagenUrl: '' }); setPubPrev(null); setConsumo({}); cargarPiezas();
    } catch (err) { setMsgPub({ ok: false, texto: err.message }); }
  };

  const tabBtn = (id, label) => (
    <button onClick={() => setTab(id)} style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'none', border: 'none', cursor: 'pointer', padding: '12px 4px', color: tab === id ? 'var(--ink)' : 'var(--ink-4)', borderBottom: tab === id ? '2px solid var(--gold)' : '2px solid transparent', marginBottom: -1 }}>{label}</button>
  );

  return (
    <div style={{ minHeight: '100vh', background: 'var(--off-white)', fontFamily: 'var(--sans)' }}>
      <div style={{ background: 'var(--white)', borderBottom: '1px solid var(--border)', padding: '0 48px', height: 66, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <Emblem size={30} fg="var(--gold)" />
          <div style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 600, color: 'var(--ink)' }}>Taller de Fabricacion</div>
        </div>
        <button onClick={onVolver} style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, padding: '8px 18px', cursor: 'pointer' }}>← Tienda</button>
      </div>

      <div style={{ maxWidth: 1080, margin: '0 auto', padding: '30px 48px' }}>
        <div style={{ display: 'flex', gap: 22, borderBottom: '1px solid var(--border)', marginBottom: 26 }}>
          {tabBtn('piezas', 'Inventario de piezas')}
          {tabBtn('venta', 'Inventario de venta')}
          {tabBtn('publicar', 'Publicar reloj')}
        </div>

        {/* ---- PIEZAS ---- */}
        {tab === 'piezas' && (
          <div className="col2" style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 26, alignItems: 'start' }}>
            <div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
                {['Todas', ...CATEGORIAS_PIEZA].map(c => (
                  <button key={c} onClick={() => setFiltro(c)} style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', padding: '7px 13px', borderRadius: 9999, cursor: 'pointer', background: filtro === c ? 'var(--ink)' : 'transparent', color: filtro === c ? 'var(--white)' : 'var(--ink-3)', border: filtro === c ? '1px solid var(--ink)' : '1px solid var(--border-dk)' }}>{c}</button>
                ))}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(180px,1fr))', gap: 12 }}>
                {piezasFiltradas.map(p => (
                  <div key={p.id} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>
                    <div style={{ height: 110, background: 'var(--off-white)', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
                      {getImageUrl(p.imagenUrl) && p.imagenUrl ? <img src={getImageUrl(p.imagenUrl)} alt={p.nombre} style={{ maxHeight: 100, maxWidth: '90%', objectFit: 'contain' }} /> : <Emblem size={34} fg="var(--border-dk)" />}
                    </div>
                    <div style={{ padding: '10px 12px' }}>
                      <div style={{ fontSize: 7.5, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--gold)' }}>{p.categoria}</div>
                      <div style={{ fontFamily: 'var(--serif)', fontSize: 14, fontWeight: 600, color: 'var(--ink)', margin: '2px 0' }}>{p.nombre}</div>
                      <div style={{ fontSize: 10, color: 'var(--ink-4)' }}>{[p.tipo, p.color, p.material].filter(Boolean).join(' · ')}</div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
                        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: p.stock === 0 ? 'var(--rose)' : 'var(--ink)' }}>{p.stock} uds</span>
                        <span>
                          <button onClick={() => editarP(p)} style={{ fontSize: 8, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', background: 'none', border: '1px solid var(--border-dk)', borderRadius: 3, padding: '4px 8px', cursor: 'pointer', marginRight: 5 }}>Editar</button>
                          <button onClick={() => borrarPieza(p.id)} style={{ fontSize: 8, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', background: 'none', border: 'none', color: 'var(--rose)', cursor: 'pointer' }}>×</button>
                        </span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {/* Form pieza */}
            <form onSubmit={guardarPieza} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '22px 24px' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>{pForm.id ? 'Editar pieza' : 'Agregar pieza'}</div>
              {msgP && <div style={{ padding: '9px 12px', borderRadius: 6, marginBottom: 12, fontSize: 12, background: msgP.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msgP.ok ? '#bbf7d0' : '#fecaca'}`, color: msgP.ok ? '#166534' : '#dc2626' }}>{msgP.texto}</div>}
              {field('Categoria', <select value={pForm.categoria} onChange={e => pset('categoria', e.target.value)} style={inp}>{CATEGORIAS_PIEZA.map(c => <option key={c} value={c}>{c}</option>)}</select>)}
              {field('Nombre', <input value={pForm.nombre} onChange={e => pset('nombre', e.target.value)} required placeholder="Dial Sunburst Azul" style={inp} />)}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                {field('Tipo', <input value={pForm.tipo} onChange={e => pset('tipo', e.target.value)} placeholder="Sunburst" style={inp} />)}
                {field('Color', <input value={pForm.color} onChange={e => pset('color', e.target.value)} placeholder="Azul" style={inp} />)}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                {field('Material', <input value={pForm.material} onChange={e => pset('material', e.target.value)} placeholder="Laton" style={inp} />)}
                {field('Stock', <input type="number" min="0" value={pForm.stock} onChange={e => pset('stock', e.target.value)} required placeholder="10" style={inp} />)}
              </div>
              {field('Foto', <label style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', border: '1px dashed var(--border-dk)', borderRadius: 4, cursor: 'pointer' }}>
                <input type="file" accept="image/*" onChange={async e => { const f = e.target.files[0]; if (f) { try { const url = await subirImagen(f); pset('imagenUrl', url); setPPrev(URL.createObjectURL(f)); } catch (err) { setMsgP({ ok: false, texto: err.message }); } } }} style={{ display: 'none' }} />
                {pPrev ? <img src={pPrev} style={{ height: 40, objectFit: 'contain' }} /> : <span style={{ fontSize: 18, color: 'var(--ink-4)' }}>+</span>}
                <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>{pForm.imagenUrl ? 'Imagen lista' : 'Subir foto'}</span>
              </label>)}
              <div style={{ display: 'flex', gap: 10 }}>
                {pForm.id && <button type="button" onClick={limpiarP} style={{ flex: 1, padding: '11px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer' }}>Cancelar</button>}
                <button type="submit" style={{ flex: 2, padding: '11px', fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>{pForm.id ? 'Guardar' : 'Agregar pieza'}</button>
              </div>
            </form>

        {tab === 'venta' && (

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>

                {field('Tipo', <select value={pub.tipoModelo} onChange={e => pubset('tipoModelo', e.target.value)} style={inp}><option>Diver</option><option>GMT</option><option>Dress</option><option>Field</option></select>)}

/* ══════════════════════════════════════════════════
   SOPORTE — tickets con hilo de mensajes (cliente <-> soporte)
══════════════════════════════════════════════════ */
const estadoTicketColor = (e) => e === 'Resuelto' ? '#2D6A4F' : e === 'Cerrado' ? 'var(--ink-4)' : e === 'En progreso' ? '#1B3461' : 'var(--gold)';

// Modal de hilo: lo usan tanto el cliente como el soporte (props para el rol)
function HiloTicket({ ticketId, autor, esSoporte, permiteEstado, onClose, onCambio }) {
  const [ticket, setTicket]   = React.useState(null);
  const [texto, setTexto]     = React.useState('');
  const [imagenUrl, setImg]   = React.useState('');
  const [prev, setPrev]       = React.useState(null);
  const estados = ['Abierto', 'En progreso', 'Resuelto', 'Cerrado'];

  const cargar = () => fetch(`${API}/api/ticket/${ticketId}`).then(r => r.json()).then(setTicket).catch(() => {});
  React.useEffect(() => { cargar(); }, []);

  const subir = async (file) => { const fd = new FormData(); fd.append('archivo', file); const r = await fetch(`${API}/api/upload`, { method: 'POST', body: fd }); if (!r.ok) throw new Error(); return (await r.json()).url; };

  const enviar = async (e) => {
    e.preventDefault(); if (!texto.trim()) return;
    await fetch(`${API}/api/ticket/${ticketId}/mensaje`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ autor, esSoporte, texto, imagenUrl: imagenUrl || null }) });
    setTexto(''); setImg(''); setPrev(null); cargar(); onCambio && onCambio();
  };
  const cambiarEstado = async (estado) => { await fetch(`${API}/api/ticket/${ticketId}/estado`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ estado }) }); cargar(); onCambio && onCambio(); };

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 600, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--white)', borderRadius: 16, width: '100%', maxWidth: 620, maxHeight: '92vh', overflowY: 'auto', boxShadow: '0 32px 80px rgba(0,0,0,0.24)' }}>
        {!ticket ? <div style={{ padding: 50, textAlign: 'center', color: 'var(--ink-4)' }}>Cargando...</div> : (
          <div>
            <div style={{ padding: '24px 28px 16px', borderBottom: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 4 }}>Ticket #{ticket.id}{ticket.pedidoId ? ` · Pedido #${ticket.pedidoId}` : ''}</div>
                  <h2 style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 600, color: 'var(--ink)' }}>{ticket.asunto}</h2>
                </div>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)' }}>✕</button>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
                <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '4px 11px', borderRadius: 9999, color: 'var(--white)', background: estadoTicketColor(ticket.estado) }}>{ticket.estado}</span>
                <span style={{ fontSize: 10, color: 'var(--ink-4)' }}>Prioridad: {ticket.prioridad} · {ticket.nombreCliente}</span>
                {permiteEstado && (
                  <select value={ticket.estado} onChange={e => cambiarEstado(e.target.value)} style={{ marginLeft: 'auto', padding: '5px 9px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 11, fontFamily: 'var(--sans)' }}>
                    {estados.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
              </div>
            </div>

            {/* Descripcion inicial + imagen */}
            <div style={{ padding: '16px 28px', borderBottom: '1px solid var(--border)' }}>
              <p style={{ fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.7 }}>{ticket.descripcion}</p>
              {ticket.imagenUrl && <img src={getImageUrl(ticket.imagenUrl)} alt="adjunto" style={{ marginTop: 10, maxHeight: 160, borderRadius: 8, border: '1px solid var(--border)' }} />}
            </div>

            {/* Hilo de mensajes */}
            <div style={{ padding: '16px 28px', display: 'flex', flexDirection: 'column', gap: 12 }}>
              {ticket.mensajes.length === 0 && <p style={{ fontSize: 12, color: 'var(--ink-4)', textAlign: 'center' }}>Aun no hay respuestas.</p>}
              {ticket.mensajes.map(m => (
                <div key={m.id} style={{ alignSelf: m.esSoporte ? 'flex-start' : 'flex-end', maxWidth: '82%' }}>
                  <div style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: m.esSoporte ? 'var(--gold)' : 'var(--ink-4)', marginBottom: 4, textAlign: m.esSoporte ? 'left' : 'right' }}>{m.esSoporte ? 'Soporte' : 'Cliente'} · {m.autor}</div>
                  <div style={{ background: m.esSoporte ? 'var(--gold-bg)' : 'var(--off-white)', border: `1px solid ${m.esSoporte ? 'var(--gold-lt)' : 'var(--border)'}`, borderRadius: 10, padding: '10px 13px', fontSize: 13, color: 'var(--ink)' }}>
                    {m.texto}
                    {m.imagenUrl && <img src={getImageUrl(m.imagenUrl)} alt="adjunto" style={{ display: 'block', marginTop: 8, maxHeight: 140, borderRadius: 6 }} />}
                  </div>
                </div>
              ))}
            </div>

            {/* Responder */}
            {ticket.estado !== 'Cerrado' && (
              <form onSubmit={enviar} style={{ padding: '14px 28px 24px', borderTop: '1px solid var(--border)' }}>
                <textarea value={texto} onChange={e => setTexto(e.target.value)} placeholder="Escribe una respuesta..." rows={2} style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--border-dk)', borderRadius: 6, fontSize: 13, fontFamily: 'var(--sans)', boxSizing: 'border-box', resize: 'vertical' }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 8 }}>
                  <label style={{ fontSize: 10, color: 'var(--ink-3)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input type="file" accept="image/*" onChange={async ev => { const f = ev.target.files[0]; if (f) { try { const url = await subir(f); setImg(url); setPrev(URL.createObjectURL(f)); } catch (e) {} } }} style={{ display: 'none' }} />
                    {prev ? <img src={prev} style={{ height: 30, borderRadius: 4 }} /> : <span style={{ border: '1px dashed var(--border-dk)', borderRadius: 4, padding: '5px 10px' }}>+ Imagen</span>}
                  </label>
                  <button type="submit" style={{ marginLeft: 'auto', padding: '9px 22px', fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Enviar</button>
                </div>
              </form>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
