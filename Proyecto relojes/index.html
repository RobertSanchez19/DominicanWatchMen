/* ══════════════════════════════════════════════════
   DASHBOARD ADMIN — metricas y alertas de stock bajo
══════════════════════════════════════════════════ */
function DashboardAdmin() {
  const [data, setData] = React.useState(null);
  React.useEffect(() => {
    Promise.all([
      fetch(`${API}/api/pedido`).then(r => r.json()),
      fetch(`${API}/api/reloj`).then(r => r.json()),
      fetch(`${API}/api/movimiento`).then(r => r.json()),
      fetch(`${API}/api/tipopulsera`).then(r => r.json()),
      fetch(`${API}/api/pieza`).then(r => r.json()),
    ]).then(([pedidos, relojes, maq, pul, piezas]) => setData({ pedidos, relojes, maq, pul, piezas })).catch(() => {});
  }, []);
  if (!data) return null;
  const { pedidos, relojes, maq, pul, piezas } = data;
  const ventas = pedidos.reduce((s, p) => s + p.total, 0);
  const unidades = pedidos.reduce((s, p) => s + (p.items || []).reduce((a, i) => a + i.cantidad, 0), 0);
  const porEstado = {};
  pedidos.forEach(p => { porEstado[p.estado] = (porEstado[p.estado] || 0) + 1; });
  const conteo = {};
  pedidos.forEach(p => (p.items || []).forEach(i => { conteo[i.relojNombre] = (conteo[i.relojNombre] || 0) + i.cantidad; }));
  const top = Object.entries(conteo).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const UMBRAL = 5;
  const bajo = [];
  relojes.forEach(r => { if ((r.stock || 0) <= UMBRAL) bajo.push({ t: 'Reloj (base)', n: r.nombre, s: r.stock }); });
  maq.forEach(m => { if (m.stock <= UMBRAL) bajo.push({ t: 'Maquina', n: m.nombre, s: m.stock }); });
  pul.forEach(p => { if (p.stock <= UMBRAL) bajo.push({ t: 'Pulsera', n: p.nombre, s: p.stock }); });
  piezas.forEach(p => { if (p.stock <= UMBRAL) bajo.push({ t: 'Pieza', n: p.nombre, s: p.stock }); });

  const card = (label, val, color) => (
    <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, padding: '18px 20px' }}>
      <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 600, color: color || 'var(--ink)' }}>{val}</div>
      <div style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-4)', marginTop: 4 }}>{label}</div>
    </div>
  );

  return (
    <div style={{ marginBottom: 30 }}>
      <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 12 }}>Resumen</div>
      <div className="col2" style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 16 }}>
        {card('Ventas', 'RD$ ' + ventas.toLocaleString('es-DO'))}
        {card('Pedidos', pedidos.length)}
        {card('Unidades vendidas', unidades)}
        {card('Alertas stock bajo', bajo.length, bajo.length ? 'var(--rose)' : 'var(--ink)')}
      </div>
      <div className="col2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, padding: '16px 18px' }}>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Mas vendidos</div>
          {top.length === 0 ? <p style={{ fontSize: 12, color: 'var(--ink-4)' }}>Sin ventas aun.</p> : top.map(([n, c]) => (
            <div key={n} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--border)', fontSize: 12.5, color: 'var(--ink-2)' }}><span>{n}</span><span style={{ fontFamily: 'var(--mono)', fontWeight: 600 }}>{c}</span></div>
          ))}
        </div>
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 10, padding: '16px 18px' }}>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Stock bajo (5 o menos)</div>
          {bajo.length === 0 ? <p style={{ fontSize: 12, color: '#2D6A4F' }}>Todo con buen stock.</p> : (
            <div style={{ maxHeight: 200, overflowY: 'auto' }}>{bajo.map((b, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--border)', fontSize: 12, color: 'var(--ink-2)' }}>
                <span><span style={{ fontSize: 8, fontWeight: 700, textTransform: 'uppercase', color: 'var(--gold)', marginRight: 6 }}>{b.t}</span>{b.n}</span>
                <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, color: b.s === 0 ? 'var(--rose)' : 'var(--ink)' }}>{b.s}</span>
              </div>
            ))}</div>
          )}
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 14, flexWrap: 'wrap' }}>
        {Object.entries(porEstado).map(([e, c]) => (<span key={e} style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-3)', border: '1px solid var(--border)', borderRadius: 9999, padding: '5px 12px' }}>{e}: {c}</span>))}
      </div>
    </div>
  );
}

        {/* Título y stats */}
        <div style={{ marginBottom: 28, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
          <div>
            <h1 style={{ fontFamily: 'var(--serif)', fontSize: 38, fontWeight: 600, color: 'var(--ink)', marginBottom: 4 }}>Gestión de Relojes</h1>
            <p style={{ fontSize: 12, color: 'var(--ink-4)' }}>{relojes.length} modelos en el catálogo · {relojes.filter(r => r.stock === 0).length} agotados · {relojes.filter(r => r.stock > 0 && r.stock <= 3).length} con stock bajo</p>
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            {[['Total', relojes.length, 'var(--ink)'], ['Agotados', relojes.filter(r => r.stock === 0).length, '#dc2626'], ['Stock bajo', relojes.filter(r => r.stock > 0 && r.stock <= 3).length, '#d97706']].map(([label, val, color]) => (
              <div key={label} style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 8, padding: '12px 20px', textAlign: 'center', minWidth: 80 }}>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 28, fontWeight: 600, color, lineHeight: 1 }}>{val}</div>
                <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-4)', marginTop: 4 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Mensaje */}
        {msg && (
          <div style={{ padding: '12px 16px', borderRadius: 8, marginBottom: 20, fontSize: 13, background: msg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msg.ok ? '#bbf7d0' : '#fecaca'}`, color: msg.ok ? '#166534' : '#dc2626', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            {msg.texto}
            <button onClick={() => setMsg(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'inherit', fontWeight: 600, fontSize: 14 }}>✕</button>
          </div>
        )}

        {/* Tabla */}
        <div style={{ background: 'var(--white)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden', boxShadow: '0 2px 16px rgba(0,0,0,0.04)' }}>
          {loading ? (
            <div style={{ textAlign: 'center', padding: 80, color: 'var(--ink-4)', fontSize: 13 }}>Cargando catálogo...</div>
          ) : (
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--off-white)', borderBottom: '2px solid var(--border)' }}>
                  {['', 'Reloj', 'Marca', 'Modelo', 'Precio', 'Stock', 'Acciones'].map(h => (
                    <th key={h} style={{ padding: '13px 16px', textAlign: 'left', fontSize: 8, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-3)', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {relojes.map((w, i) => {
                  const maq = w.movimientosCompatibles || [];
                  const pul = w.pulserasCompatibles || [];
                  const stockTotal = (maq.length && pul.length) ? Math.min(w.stock || 0, Math.max(...maq.map(m => m.stock)), Math.max(...pul.map(p => p.stock))) : (w.stock || 0);
                  return (
                  <tr key={w.id} style={{ borderBottom: i < relojes.length - 1 ? '1px solid var(--border)' : 'none' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--off-white)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <td style={{ padding: '10px 16px', width: 64 }}>
                      {getImageUrl(w.imagenUrl)
                        ? <img src={getImageUrl(w.imagenUrl)} style={{ height: 50, width: 50, objectFit: 'contain', filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.12))' }} />
                        : <div style={{ width: 50, height: 50, borderRadius: 6, background: 'var(--warm-grey)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Emblem size={28} fg="var(--border-dk)" /></div>
                      }
                    </td>
                    <td style={{ padding: '10px 16px' }}>
                      <div style={{ fontFamily: 'var(--serif)', fontSize: 16, fontWeight: 600, color: 'var(--ink)' }}>{w.nombre}</div>
                      <div style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2 }}>ID #{w.id}</div>
                    </td>
                    <td style={{ padding: '10px 16px', fontSize: 11, color: 'var(--gold)', fontWeight: 600, letterSpacing: '0.06em' }}>{w.marca?.nombre || '—'}</td>
                    <td style={{ padding: '10px 16px', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-4)' }}>{w.modelo}</td>
                    <td style={{ padding: '10px 16px', fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 600, color: 'var(--ink-2)', whiteSpace: 'nowrap' }}>RD$ {w.precio.toLocaleString('es-DO')}</td>
                    <td style={{ padding: '10px 16px' }}>
                      <span style={{ display: 'inline-block', padding: '4px 10px', borderRadius: 9999, fontSize: 11, fontWeight: 700, whiteSpace: 'nowrap', background: stockTotal === 0 ? '#fee2e2' : stockTotal <= 3 ? '#fef9c3' : '#dcfce7', color: stockTotal === 0 ? '#dc2626' : stockTotal <= 3 ? '#854d0e' : '#166534' }}>
                        {stockTotal === 0 ? 'Agotado' : `${stockTotal} uds`}
                      </span>
                      <div style={{ fontSize: 9, color: 'var(--ink-4)', marginTop: 4 }}>{maq.length} maq · {pul.length} pul</div>
                    </td>
                    <td style={{ padding: '10px 16px' }}>
                      <div style={{ display: 'flex', gap: 8 }}>
                        <button onClick={() => setVariantesReloj(w)} style={{ ...btnBase, background: 'var(--gold-bg)', color: 'var(--gold)', border: '1px solid var(--gold-lt)' }}
                          onMouseEnter={e => { e.currentTarget.style.background = 'var(--gold)'; e.currentTarget.style.color = 'var(--white)'; }}
                          onMouseLeave={e => { e.currentTarget.style.background = 'var(--gold-bg)'; e.currentTarget.style.color = 'var(--gold)'; }}>
                          Opciones
                        </button>
                        <button onClick={() => setModal({ modo: 'editar', reloj: w })} style={{ ...btnBase, background: 'transparent', color: 'var(--ink)', border: '1px solid var(--border-dk)' }}
                          onMouseEnter={e => { e.currentTarget.style.background = 'var(--ink)'; e.currentTarget.style.color = 'var(--white)'; }}
                          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--ink)'; }}>
                          Editar
                        </button>
                        <button onClick={() => setConfirm(w)} style={{ ...btnBase, background: 'transparent', color: 'var(--rose)', border: '1px solid rgba(176,112,85,0.35)' }}
                          onMouseEnter={e => { e.currentTarget.style.background = 'var(--rose)'; e.currentTarget.style.color = 'var(--white)'; }}
                          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--rose)'; }}>
                          Eliminar
                        </button>
                      </div>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {/* Modal crear/editar */}
      {modal && (
        <RelojModal
          modo={modal.modo} reloj={modal.reloj} marcas={marcas}
          onClose={() => setModal(null)}
          onGuardado={() => { setModal(null); cargar(); onCambio(); setMsg({ ok: true, texto: modal.modo === 'crear' ? 'Reloj creado exitosamente' : 'Reloj actualizado exitosamente' }); }}
        />
      )}

      {/* Modal de compatibilidad (que opciones admite el reloj) */}
      {variantesReloj && (
        <CompatibilidadModal
          reloj={variantesReloj}
          onClose={() => setVariantesReloj(null)}
          onCambio={() => { cargar(); onCambio(); }}
        />
      )}

      {/* Modal de componentes (inventario de maquinas y pulseras) */}
      {componentesOpen && (
        <ComponentesModal
          onClose={() => setComponentesOpen(false)}
          onCambio={() => cargar()}
        />
      )}

      {/* Modal de pedidos (ordenes de compra) */}
      {pedidosOpen && <PedidosModal onClose={() => setPedidosOpen(false)} />}

      {/* Modal de usuarios y roles */}
      {usuariosOpen && <UsuariosModal onClose={() => setUsuariosOpen(false)} />}

      {/* Confirmación de eliminación */}
      {confirmDelete && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 400, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ background: 'var(--white)', borderRadius: 12, padding: '36px 40px', maxWidth: 420, width: '100%', margin: 24, boxShadow: '0 24px 64px rgba(0,0,0,0.2)' }}>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, color: 'var(--ink)', marginBottom: 10 }}>¿Eliminar reloj?</div>
            <p style={{ fontSize: 13, color: 'var(--ink-3)', marginBottom: 28, lineHeight: 1.7 }}>
              Estás a punto de eliminar <strong style={{ color: 'var(--ink)' }}>{confirmDelete.nombre}</strong>.<br />Esta acción no se puede deshacer.
            </p>
            <div style={{ display: 'flex', gap: 12 }}>
              <button onClick={() => setConfirm(null)} style={{ flex: 1, padding: '12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer' }}>Cancelar</button>
              <button onClick={() => handleDelete(confirmDelete.id)} style={{ flex: 1, padding: '12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--rose)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PANEL — contenedor reutilizable (recibe PROPS + CHILDREN)
   El componente PADRE coloca contenido dentro de <Panel>...</Panel>
══════════════════════════════════════════════════ */
function Panel({ eyebrow, titulo, children }) {
  return (
    <div style={{ background: 'var(--white)', border: '1px solid var(--border)', borderRadius: 12, padding: '30px 32px', boxShadow: '0 2px 16px rgba(0,0,0,0.04)' }}>
      {eyebrow && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
          <span style={{ width: 18, height: 1, background: 'var(--gold)', display: 'block' }} />
          <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)' }}>{eyebrow}</span>
        </div>
      )}
      {titulo && <h3 style={{ fontFamily: 'var(--serif)', fontSize: 23, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>{titulo}</h3>}
      {/* children = lo que el padre pasó dentro de este componente */}
      {children}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CONTADOR — selector de cantidad (useState) con cotización
══════════════════════════════════════════════════ */
function Contador({ precio = 0, max = Infinity, onCantidad }) {
  const [cantidad, setCantidad] = React.useState(1);
  // Si cambia el tope (otro componente/stock), ajusta la cantidad para no pasarse del stock
  React.useEffect(() => { setCantidad(c => Math.min(Math.max(1, c), Math.max(1, max))); }, [max]);
  // Reporta la cantidad al padre (para agregar al carrito con la cantidad elegida)
  React.useEffect(() => { if (onCantidad) onCantidad(cantidad); }, [cantidad]);
  const btn = { width: 44, height: 44, borderRadius: '50%', border: '1px solid var(--border-dk)', background: 'var(--white)', color: 'var(--ink)', fontSize: 20, fontWeight: 400, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 0.2s' };
  const hoverOn  = e => { e.currentTarget.style.borderColor = 'var(--gold)'; e.currentTarget.style.color = 'var(--gold)'; };
  const hoverOff = e => { e.currentTarget.style.borderColor = 'var(--border-dk)'; e.currentTarget.style.color = 'var(--ink)'; };
  const enTope = cantidad >= max;
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 24, marginBottom: 22 }}>
        <button style={btn} onClick={() => setCantidad(c => Math.max(1, c - 1))} onMouseEnter={hoverOn} onMouseLeave={hoverOff}>−</button>
        <div style={{ textAlign: 'center', minWidth: 84 }}>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 46, fontWeight: 600, color: 'var(--ink)', lineHeight: 1 }}>{cantidad}</div>
          <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-4)', marginTop: 6 }}>{cantidad === 1 ? 'Pieza' : 'Piezas'}</div>
        </div>
        <button style={{ ...btn, opacity: enTope ? 0.35 : 1, cursor: enTope ? 'not-allowed' : 'pointer' }} disabled={enTope} onClick={() => setCantidad(c => Math.min(max, c + 1))} onMouseEnter={e => { if (!enTope) hoverOn(e); }} onMouseLeave={hoverOff}>+</button>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: '1px solid var(--border)', paddingTop: 16 }}>
        <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Total estimado</span>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 18, fontWeight: 600, color: 'var(--ink)' }}>RD$ {(precio * cantidad).toLocaleString('es-DO')}</span>
      </div>
      <button onClick={() => setCantidad(1)} style={{ marginTop: 16, width: '100%', padding: '11px', fontSize: 9, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer' }}>Reiniciar</button>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CONFIGURADOR POR-RELOJ — se abre al seleccionar un reloj
   Elige maquina + pulsera -> muestra precio y stock de esa variante
══════════════════════════════════════════════════ */
// Estrellas de calificacion (solo lectura o clicables si se pasa onClick)
function Estrellas({ valor = 0, tam = 13, onClick }) {
  return <span style={{ display: 'inline-flex', gap: 1 }}>
    {[1, 2, 3, 4, 5].map(n => (
      <span key={n} onClick={onClick ? () => onClick(n) : undefined}
        style={{ fontSize: tam, lineHeight: 1, color: n <= Math.round(valor) ? 'var(--gold)' : 'var(--border-dk)', cursor: onClick ? 'pointer' : 'default' }}>★</span>
    ))}
  </span>;
}

// Seccion de reseñas de un reloj (promedio, lista y formulario)
function ResenasReloj({ reloj, usuario }) {
  const [resenas, setResenas]     = React.useState(reloj.resenas || []);
  const [calif, setCalif]         = React.useState(5);
  const [comentario, setComentario] = React.useState('');
  const [msg, setMsg]             = React.useState(null);
  const [puede, setPuede]         = React.useState(false);   // solo quien compro el reloj puede reseñar
  const cargar = () => fetch(`${API}/api/resena?relojId=${reloj.id}`).then(r => r.json()).then(setResenas).catch(() => {});
  React.useEffect(() => { cargar(); }, []);
  React.useEffect(() => {
    if (!usuario) { setPuede(false); return; }
    fetch(`${API}/api/resena/puede-resenar?usuarioId=${usuario.id}&relojId=${reloj.id}`)
      .then(r => r.json()).then(d => setPuede(!!d.puede)).catch(() => setPuede(false));
  }, [usuario, reloj.id]);
  const promedio = resenas.length ? resenas.reduce((s, r) => s + r.calificacion, 0) / resenas.length : 0;
  const enviar = async (e) => {
    e.preventDefault(); setMsg(null);
    try {
      const r = await fetch(`${API}/api/resena`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ relojId: reloj.id, usuarioId: usuario.id, nombreCliente: `${usuario.nombre} ${usuario.apellido || ''}`.trim(), calificacion: calif, comentario }) });
      if (!r.ok) throw new Error();
      setComentario(''); setMsg({ ok: true, texto: 'Gracias por tu reseña' }); cargar();
    } catch (err) { setMsg({ ok: false, texto: 'Error al enviar' }); }
  };
  return (
    <div style={{ padding: '20px 34px 28px', borderTop: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
        <div style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 600, color: 'var(--ink)' }}>Reseñas</div>
        {resenas.length > 0 && <><Estrellas valor={promedio} /><span style={{ fontSize: 12, color: 'var(--ink-4)' }}>{promedio.toFixed(1)} · {resenas.length} reseña{resenas.length !== 1 ? 's' : ''}</span></>}
      </div>
      {resenas.length === 0 ? <p style={{ fontSize: 12, color: 'var(--ink-4)', marginBottom: 14 }}>Aun no hay reseñas. ¡Se el primero!</p>
        : <div style={{ marginBottom: 16 }}>{resenas.map(r => (
            <div key={r.id} style={{ padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Estrellas valor={r.calificacion} tam={11} /><span style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink)' }}>{r.nombreCliente}</span></div>
              <p style={{ fontSize: 12.5, color: 'var(--ink-2)', marginTop: 4 }}>{r.comentario}</p>
            </div>
          ))}</div>}
      {usuario && puede && (
        <form onSubmit={enviar} style={{ background: 'var(--off-white)', borderRadius: 8, padding: '14px 16px' }}>
          {msg && <div style={{ fontSize: 11, marginBottom: 8, color: msg.ok ? '#2D6A4F' : 'var(--rose)' }}>{msg.texto}</div>}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Tu calificacion:</span>
            <Estrellas valor={calif} tam={18} onClick={setCalif} />
          </div>
          <textarea value={comentario} onChange={e => setComentario(e.target.value)} required rows={2} placeholder="Escribe tu opinion..." style={{ width: '100%', padding: '9px 11px', border: '1px solid var(--border-dk)', borderRadius: 6, fontSize: 12.5, fontFamily: 'var(--sans)', boxSizing: 'border-box', resize: 'vertical' }} />
          <button type="submit" style={{ marginTop: 8, padding: '9px 20px', fontSize: 9.5, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Enviar reseña</button>
        </form>
      )}
    </div>
  );
}

// Linea de un pedido con opcion de dejar/actualizar la reseña de ese reloj
function PedidoItemResena({ item, usuario }) {
  const [open, setOpen]           = React.useState(false);
  const [calif, setCalif]         = React.useState(5);
  const [comentario, setComentario] = React.useState('');
  const [msg, setMsg]             = React.useState(null);
  const [enviada, setEnviada]     = React.useState(false);

  const enviar = async (e) => {
    e.preventDefault(); setMsg(null);
    try {
      const r = await fetch(`${API}/api/resena`, { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ relojId: item.relojId, usuarioId: usuario.id, nombreCliente: `${usuario.nombre} ${usuario.apellido || ''}`.trim(), calificacion: calif, comentario }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al enviar la reseña');
      setEnviada(true); setOpen(false);
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
  };

  return (
    <div style={{ padding: '6px 0', borderBottom: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span>{item.relojNombre} <span style={{ color: 'var(--ink-4)' }}>({item.maquinaNombre} · {item.pulseraNombre}) x{item.cantidad}</span></span>
        <span style={{ fontFamily: 'var(--mono)' }}>RD$ {item.subtotal.toLocaleString('es-DO')}</span>
      </div>
      {enviada ? (
        <div style={{ fontSize: 11, color: '#2D6A4F', marginTop: 4 }}>Reseña enviada. ¡Gracias!</div>
      ) : open ? (
        <form onSubmit={enviar} style={{ background: 'var(--off-white)', borderRadius: 8, padding: '10px 12px', marginTop: 6 }}>
          {msg && <div style={{ fontSize: 11, marginBottom: 6, color: 'var(--rose)' }}>{msg.texto}</div>}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Calificacion:</span>
            <Estrellas valor={calif} tam={16} onClick={setCalif} />
          </div>
          <textarea value={comentario} onChange={e => setComentario(e.target.value)} required rows={2} placeholder="Escribe tu opinion sobre este reloj..." style={{ width: '100%', padding: '8px 10px', border: '1px solid var(--border-dk)', borderRadius: 6, fontSize: 12, fontFamily: 'var(--sans)', boxSizing: 'border-box', resize: 'vertical' }} />
          <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
            <button type="submit" style={{ padding: '7px 16px', fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Enviar reseña</button>
            <button type="button" onClick={() => setOpen(false)} style={{ padding: '7px 16px', fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: 'none', cursor: 'pointer' }}>Cancelar</button>
          </div>
        </form>
      ) : (
        <button type="button" onClick={() => setOpen(true)} style={{ marginTop: 4, background: 'none', border: 'none', padding: 0, cursor: 'pointer', fontSize: 10.5, fontWeight: 600, letterSpacing: '0.06em', color: 'var(--gold)', textDecoration: 'underline' }}>Dejar reseña</button>
      )}
    </div>
  );
}

function ConfiguradorReloj({ reloj, onClose, onAgregar, usuario }) {
  // Componentes INDEPENDIENTES compatibles con este reloj (modelo BOM)
  const maquinas = reloj.movimientosCompatibles || [];
  const pulseras = reloj.pulserasCompatibles || [];
  const [movId, setMovId]       = React.useState(maquinas[0] ? maquinas[0].id : null);
  const [pulId, setPulId]       = React.useState(pulseras[0] ? pulseras[0].id : null);
  const [cantidad, setCantidad] = React.useState(1);
  const [agregado, setAgregado] = React.useState(false);

  const maquina = maquinas.find(m => m.id === movId) || null;
  const pulsera = pulseras.find(p => p.id === pulId) || null;

  // Precio = base del reloj + extra de la maquina + extra de la pulsera
  const precio = (reloj.precio || 0) + (maquina ? maquina.precioExtra : 0) + (pulsera ? pulsera.precioExtra : 0);
  // Disponibilidad = minimo entre base, maquina y pulsera (se ensambla con 1 de cada uno)
  const disponible = Math.min(reloj.stock || 0, maquina ? maquina.stock : 0, pulsera ? pulsera.stock : 0);
  const faltante = (reloj.stock || 0) <= 0 ? 'la base' : (maquina && maquina.stock <= 0 ? maquina.nombre : (pulsera && pulsera.stock <= 0 ? pulsera.nombre : null));

  const chip = (activo, agotado) => ({
    fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase',
    padding: '9px 16px', borderRadius: 9999, cursor: agotado ? 'not-allowed' : 'pointer',
    background: activo ? 'var(--ink)' : 'transparent',
    color: agotado ? 'var(--ink-4)' : (activo ? 'var(--white)' : 'var(--ink-3)'),
    border: activo ? '1px solid var(--ink)' : '1px solid var(--border-dk)',
    opacity: agotado ? 0.5 : 1, transition: 'all 0.2s',
  });

  const agregar = () => {
    if (!maquina || !pulsera || disponible <= 0) return;
    onAgregar && onAgregar({
      relojId: reloj.id, relojNombre: reloj.nombre, imagenUrl: reloj.imagenUrl,
      movimientoId: maquina.id, maquina: maquina.nombre,
      tipoPulseraId: pulsera.id, pulsera: pulsera.nombre,
      precio, cantidad, max: disponible,
    });
    setAgregado(true);
    setTimeout(() => setAgregado(false), 1800);
  };

  const sinOpciones = maquinas.length === 0 || pulseras.length === 0;

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 400, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>

              : <WatchPlaceholder size={200} />}
          </div>

          {/* Configuracion */}
          <div style={{ padding: '30px 34px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
              <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--gold)' }}>{reloj.marca?.nombre || 'Dominican Watch Men'}</div>
              <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)' }}>✕</button>
            </div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 28, fontWeight: 600, color: 'var(--ink)', marginBottom: 2 }}>{reloj.nombre}</h2>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', marginBottom: 22 }}>{reloj.modelo}</div>

            {sinOpciones ? (
              <p style={{ fontSize: 13, color: 'var(--ink-3)' }}>Este reloj aun no tiene maquinas o pulseras configuradas.</p>
            ) : (
              <>
                {/* Selector de maquina (independiente) */}
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Maquina</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                    {maquinas.map(m => {
                      const ag = m.stock <= 0;
                      return <button key={m.id} disabled={ag} onClick={() => !ag && setMovId(m.id)} style={chip(movId === m.id, ag)}>
                        {m.nombre}{m.precioExtra > 0 ? ` +${m.precioExtra.toLocaleString('es-DO')}` : ''}{ag ? ' · agotada' : ''}
                      </button>;
                    })}
                  </div>
                </div>

                {/* Selector de pulsera (independiente) */}
                <div style={{ marginBottom: 22 }}>
                  <div style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Pulsera</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                    {pulseras.map(p => {
                      const ag = p.stock <= 0;
                      return <button key={p.id} disabled={ag} onClick={() => !ag && setPulId(p.id)} style={chip(pulId === p.id, ag)}>
                        {p.nombre}{p.precioExtra > 0 ? ` +${p.precioExtra.toLocaleString('es-DO')}` : ''}{ag ? ' · agotada' : ''}
                      </button>;
                    })}
                  </div>
                </div>

                {/* Resumen y accion (Panel recibe children) */}
                <Panel>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                    <div style={{ fontFamily: 'var(--mono)', fontSize: 22, fontWeight: 600, color: 'var(--ink)' }}>RD$ {precio.toLocaleString('es-DO')}</div>
                    {disponible > 0
                      ? <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--gold)' }}>{disponible} disponibles</span>
                      : <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--rose)' }}>Agotado{faltante ? ` (${faltante})` : ''}</span>}
                  </div>

                  {disponible > 0 && (
                    <>
                      <Contador precio={precio} max={disponible} onCantidad={setCantidad} />
                      <button onClick={agregar} style={{
                        marginTop: 14, width: '100%', padding: '14px', fontSize: 10, fontWeight: 700,
                        letterSpacing: '0.16em', textTransform: 'uppercase', borderRadius: 3, border: 'none', cursor: 'pointer',
                        background: agregado ? 'var(--forest, #2D6A4F)' : 'var(--ink)', color: 'var(--white)', transition: 'background 0.25s',
                      }}
                        onMouseEnter={e => { if (!agregado) e.currentTarget.style.background = 'var(--gold)'; }}
                        onMouseLeave={e => { if (!agregado) e.currentTarget.style.background = 'var(--ink)'; }}>
                        {agregado ? 'Agregado a tu seleccion' : 'Añadir al carrito'}
                      </button>
                    </>
                  )}
                </Panel>
              </>
            )}
          </div>
        </div>
        <ResenasReloj reloj={reloj} usuario={usuario} />
      </div>
    </div>
  );
}
