<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominican Watch Men — Precision Horology</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:     #FFFFFF;
  --off-white: #F8F6F2;
  --warm-grey: #F0EDE8;
  --border:    #E2DDD7;
  --border-dk: #C8C3BB;

  --ink:       #111110;
  --ink-2:     #3A3835;
  --ink-3:     #6B6762;
  --ink-4:     #9C9892;

  --gold:      #B8922A;
  --gold-lt:   #C9A84C;
  --gold-pale: #F5ECD5;
  --gold-bg:   rgba(184,146,42,0.07);

  --navy:      #1B3461;
  --rose:      #B07055;

  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --serif: 'Cormorant Garamond', Garamond, Georgia, serif;
  --sans:  'Jost', 'Helvetica Neue', sans-serif;
  --mono:  'JetBrains Mono', monospace;
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { background: var(--white); color: var(--ink); font-family: var(--sans); }
button { font-family: var(--sans); cursor: pointer; border: none; }
a { text-decoration: none; color: inherit; }

@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-33.33%); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== Responsive: apila columnas y ajusta paddings en pantallas chicas ===== */
@media (max-width: 760px) {
  .col2 { grid-template-columns: 1fr !important; }
  .col3 { grid-template-columns: 1fr !important; gap: 12px !important; }
  nav { padding: 0 20px !important; height: auto !important; flex-wrap: wrap !important; gap: 10px !important; }
  .page-pad { padding-left: 20px !important; padding-right: 20px !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ══════════════════════════════════════════════════
   EMBLEM — Dominican flag crosshair dial
══════════════════════════════════════════════════ */
function Emblem({ size = 64, fg = 'var(--gold)', flag = false }) {
  const c = 60, ticks = [];
  for (let i = 0; i < 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180, major = i % 3 === 0;
    const r1 = 50, r2 = major ? 40 : 45;
    ticks.push(
      <line key={i}
        x1={(c + Math.cos(a) * r1).toFixed(2)} y1={(c + Math.sin(a) * r1).toFixed(2)}
        x2={(c + Math.cos(a) * r2).toFixed(2)} y2={(c + Math.sin(a) * r2).toFixed(2)}
        stroke={fg} strokeWidth={major ? 2.2 : 1} strokeLinecap="round" />
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" fill="none"
      style={{ display: 'block', flexShrink: 0 }} aria-label="Dominican Watch Men">
      <circle cx="60" cy="60" r="56" fill="none" stroke={fg} strokeWidth="2.2" />
      <circle cx="60" cy="60" r="50.5" fill="none" stroke={fg} strokeWidth="0.6" opacity="0.5" />
      {flag && (
        <g>
          <path d="M60,60 L60,18 A42,42,0,0,0,18,60 Z" fill="#0A3A8C" />
          <path d="M60,60 L102,60 A42,42,0,0,0,60,18 Z" fill="#CE1126" />
          <path d="M60,60 L18,60 A42,42,0,0,0,60,102 Z" fill="#CE1126" />
          <path d="M60,60 L60,102 A42,42,0,0,0,102,60 Z" fill="#0A3A8C" />
        </g>
      )}
      {ticks}
      <g stroke={fg} strokeWidth="1" opacity="0.9">
        <line x1="60" y1="20" x2="60" y2="100" />
        <line x1="20" y1="60" x2="100" y2="60" />
      </g>
      <circle cx="60" cy="60" r="4.4" fill={fg} />
      <circle cx="60" cy="60" r="8" fill="none" stroke={fg} strokeWidth="1" />
      <text x="60" y="80" textAnchor="middle" fontFamily="var(--mono)" fontSize="8.5"
        fontWeight="500" letterSpacing="1.5" fill={fg}>RD</text>
    </svg>
  );
}

/* ══════════════════════════════════════════════════
   NAV
══════════════════════════════════════════════════ */
function Nav({ scrolled, usuario, onOpenCuenta, onOpenAdmin, onNavigate, carritoCount = 0, onOpenCarrito }) {
  const links = [
    { label: 'Colecciones',      target: 'colecciones' },
    { label: 'Especificaciones', target: 'especificaciones' },
    { label: 'El Proceso',       target: 'proceso' },
  ];
  const irA = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth' }); };
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      height: 72, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '0 56px',
      background: scrolled ? 'rgba(255,255,255,0.96)' : 'rgba(255,255,255,0)',
      borderBottom: scrolled ? '1px solid var(--border)' : '1px solid transparent',
      backdropFilter: scrolled ? 'blur(20px)' : 'none',
      transition: 'all 0.45s var(--ease)',
    }}>
      <div onClick={() => onNavigate && onNavigate('/')} style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
        <Emblem size={38} fg="var(--gold)" />
        <div style={{ lineHeight: 1 }}>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 21, fontWeight: 600, color: 'var(--ink)', letterSpacing: '0.03em' }}>Dominican</div>
          <div style={{ fontSize: 7.5, fontWeight: 600, letterSpacing: '0.26em', textTransform: 'uppercase', color: 'var(--gold)', marginTop: 3 }}>Watch Men · RD</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
        {links.map(l => (
          <a key={l.label} href="#" style={{ fontSize: 10, fontWeight: 500, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', transition: 'color 0.2s' }}
            onClick={e => { e.preventDefault(); irA(l.target); }}
            onMouseEnter={e => e.target.style.color = 'var(--ink)'}
            onMouseLeave={e => e.target.style.color = 'var(--ink-3)'}>{l.label}</a>
        ))}
        <a href="#" style={{ fontSize: 10, fontWeight: 500, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', transition: 'color 0.2s' }}
          onClick={e => { e.preventDefault(); onNavigate && onNavigate('/garantia'); }}
          onMouseEnter={e => e.target.style.color = 'var(--ink)'}
          onMouseLeave={e => e.target.style.color = 'var(--ink-3)'}>Garantia</a>
        {usuario?.esAdmin && (
          <button onClick={onOpenAdmin} style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase',
            background: 'var(--ink)', color: 'var(--white)', border: 'none',
            padding: '8px 16px', borderRadius: 3, transition: 'background 0.25s', cursor: 'pointer',
          }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--gold)'}
            onMouseLeave={e => e.currentTarget.style.background = 'var(--ink)'}>
            Admin
          </button>
        )}
        {(usuario?.rol === 'Fabricante' || usuario?.rol === 'Admin') && (
          <button onClick={() => onNavigate && onNavigate('/fabricacion')} style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase',
            background: 'var(--ink)', color: 'var(--white)', border: 'none',
            padding: '8px 16px', borderRadius: 3, transition: 'background 0.25s', cursor: 'pointer',
          }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--gold)'}
            onMouseLeave={e => e.currentTarget.style.background = 'var(--ink)'}>
            Taller
          </button>
        )}
        {(usuario?.rol === 'Soporte' || usuario?.rol === 'Admin') && (
          <button onClick={() => onNavigate && onNavigate('/soporte')} style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase',
            background: 'var(--ink)', color: 'var(--white)', border: 'none',
            padding: '8px 16px', borderRadius: 3, transition: 'background 0.25s', cursor: 'pointer',
          }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--gold)'}
            onMouseLeave={e => e.currentTarget.style.background = 'var(--ink)'}>
            Soporte
          </button>
        )}
        <button onClick={onOpenCuenta} style={{
          fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase',
          background: usuario ? 'var(--gold-pale)' : 'transparent',
          color: usuario ? 'var(--gold)' : 'var(--ink-3)',
          border: `1px solid ${usuario ? 'var(--gold-lt)' : 'var(--border-dk)'}`,
          padding: '9px 18px', borderRadius: 3, transition: 'all 0.25s', cursor: 'pointer',
        }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--gold)'; e.currentTarget.style.color = 'var(--gold)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = usuario ? 'var(--gold-lt)' : 'var(--border-dk)'; e.currentTarget.style.color = usuario ? 'var(--gold)' : 'var(--ink-3)'; }}
        >
          {usuario ? `${usuario.nombre}` : 'Mi Cuenta'}
        </button>
        <button onClick={onOpenCarrito} style={{
          fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase',
          background: 'var(--ink)', color: 'var(--white)', border: 'none',
          padding: '9px 16px', borderRadius: 3, cursor: 'pointer', transition: 'background 0.25s',
        }}
          onMouseEnter={e => e.currentTarget.style.background = 'var(--gold)'}
          onMouseLeave={e => e.currentTarget.style.background = 'var(--ink)'}>
          Carrito{carritoCount > 0 ? ` · ${carritoCount}` : ''}
        </button>
      </div>
    </nav>
  );
}

/* ══════════════════════════════════════════════════
   HERO
══════════════════════════════════════════════════ */
function Hero() {
  const irA = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth' }); };
  return (
    <section className="col2" style={{
      minHeight: '100vh', background: 'var(--white)', display: 'grid',
      gridTemplateColumns: '1fr 1fr', alignItems: 'center', padding: '0 0 0 56px', overflow: 'hidden',
    }}>
      {/* Left text */}
      <div style={{ paddingTop: 72, maxWidth: 540 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
          <span style={{ display: 'block', width: 28, height: 1, background: 'var(--gold)' }}></span>
          <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.28em', textTransform: 'uppercase', color: 'var(--gold)' }}>Alta Relojería · Seiko Mods</span>
        </div>
        <h1 style={{
          fontFamily: 'var(--serif)', fontSize: 'clamp(54px,5.5vw,84px)', fontWeight: 600,
          lineHeight: 1.05, letterSpacing: '-0.01em', color: 'var(--ink)', marginBottom: 28,
        }}>
          No vendemos<br />
          <em style={{ fontStyle: 'italic', fontWeight: 400, color: 'var(--gold)' }}>relojes.</em><br />
          Ensamblamos<br />tiempo.
        </h1>
        <p style={{ fontSize: 14, fontWeight: 400, lineHeight: 1.8, color: 'var(--ink-3)', maxWidth: 420, marginBottom: 40 }}>
          Movimientos Seiko originales. Componentes de grado quirúrgico.
          Diseños inspirados en los íconos de la alta relojería. Piezas únicas con alma clásica.
        </p>
        <div style={{ display: 'flex', gap: 12, marginBottom: 56 }}>
          <button onClick={() => irA('colecciones')} style={{
            fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase',
            background: 'var(--ink)', color: 'var(--white)', padding: '15px 32px', borderRadius: 3,
            transition: 'all 0.3s', cursor: 'pointer', border: 'none',
          }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--gold)'}
            onMouseLeave={e => e.currentTarget.style.background = 'var(--ink)'}>
            Explorar Colección
          </button>
          <button onClick={() => irA('especificaciones')} style={{
            fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase',
            background: 'transparent', color: 'var(--ink)',
            border: '1px solid var(--border-dk)', padding: '15px 32px', borderRadius: 3,
            transition: 'all 0.3s', cursor: 'pointer',
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--gold)'; e.currentTarget.style.color = 'var(--gold)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border-dk)'; e.currentTarget.style.color = 'var(--ink)'; }}>
            Ver Especificaciones
          </button>
        </div>
        {/* Stats */}
        <div style={{ display: 'flex', gap: 40, borderTop: '1px solid var(--border)', paddingTop: 28 }}>
          {[['20+', 'Modelos únicos'], ['100%', 'Seiko original'], ['316L', 'Acero quirúrgico']].map(([n, l]) => (
            <div key={l}>
              <div style={{ fontFamily: 'var(--serif)', fontSize: 36, fontWeight: 600, color: 'var(--ink)', lineHeight: 1 }}>{n}</div>
              <div style={{ fontSize: 8.5, fontWeight: 500, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-4)', marginTop: 5 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Right — hero watch */}
      <div style={{
        height: '100vh', background: 'var(--off-white)', display: 'flex',
        alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{
          position: 'absolute', inset: 0,
          background: 'radial-gradient(ellipse 70% 70% at 50% 45%, rgba(255,255,255,1) 0%, var(--off-white) 100%)',
          pointerEvents: 'none',
        }} />
        <div style={{ position: 'absolute', width: 480, height: 480, borderRadius: '50%', border: '1px solid rgba(184,146,42,0.12)', pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', width: 600, height: 600, borderRadius: '50%', border: '1px solid rgba(184,146,42,0.06)', pointerEvents: 'none' }} />
        <img src="assets/products/transparent/submariner-steel-bk-bk.png" alt="Submariner Steel"
          style={{
            position: 'relative', zIndex: 1, width: '75%', maxWidth: 440, height: 'auto',
            objectFit: 'contain',
            filter: 'drop-shadow(0 40px 80px rgba(0,0,0,0.18)) drop-shadow(0 8px 24px rgba(0,0,0,0.12))',
          }} />
        <div style={{
          position: 'absolute', bottom: 40, left: 40,
          fontSize: 8, fontWeight: 600, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-4)',
        }}>
          THE DIVER SERIES · NH35A
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════
   MARQUEE STRIP
══════════════════════════════════════════════════ */
function Strip() {
  const items = ['Cristal de Zafiro', 'Acero 316L', 'Movimiento NH35', '300m Water Resistant', 'Ensamblado a Mano', 'Seiko Original', 'Alta Relojería'];
  const repeated = [...items, ...items, ...items];
  return (
    <div style={{ background: 'var(--off-white)', padding: '16px 0', overflow: 'hidden', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', gap: 48, whiteSpace: 'nowrap', animation: 'marquee 28s linear infinite' }}>
        {repeated.map((t, i) => (
          <span key={i} style={{
            fontSize: 9, fontWeight: 500, letterSpacing: '0.28em',
            textTransform: 'uppercase', color: 'var(--ink-2)', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 48,
          }}>
            {t}
            <span style={{ color: 'var(--gold)', fontSize: 8 }}>✦</span>
          </span>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   COLLECTION GRID — datos desde la API
══════════════════════════════════════════════════ */
const T   = 'assets/products/transparent/';
const API = 'http://localhost:5157';

function WatchPlaceholder({ size = 185, hovered = false }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: hovered ? 'var(--gold-pale)' : 'var(--warm-grey)',
      border: `2px solid ${hovered ? 'var(--gold-lt)' : 'var(--border)'}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      transition: 'all 0.4s var(--ease)',
    }}>
      <Emblem size={size * 0.55} fg={hovered ? 'var(--gold)' : 'var(--border-dk)'} />
    </div>
  );
}

function getImageUrl(imagenUrl) {
  if (!imagenUrl) return null;
  if (imagenUrl.startsWith('http')) return imagenUrl;
  return `${window.location.origin}/${imagenUrl}`;
}

function CollectionGrid({ refreshKey = 0, onAgregar, productoId, onAbrir, onCerrarDetalle, usuario }) {
  const [active, setActive]   = React.useState('Todos');
  const [hov, setHov]         = React.useState(null);
  const [relojes, setRelojes] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError]     = React.useState(null);
  const [busqueda, setBusqueda]   = React.useState('');
  const [orden, setOrden]         = React.useState('relevancia');
  const [precioMax, setPrecioMax] = React.useState('');
  const [favIds, setFavIds]       = React.useState(new Set());
  // El reloj a configurar viene de la ruta /producto/:id
  const detalle = productoId ? relojes.find(r => r.id === productoId) : null;

  React.useEffect(() => {
    if (usuario) fetch(`${API}/api/favorito?usuarioId=${usuario.id}`).then(r => r.json()).then(list => setFavIds(new Set(list.map(x => x.id)))).catch(() => {});
    else setFavIds(new Set());
  }, [usuario, refreshKey]);
  const toggleFav = async (relojId) => {
    const has = favIds.has(relojId);
    const next = new Set(favIds); has ? next.delete(relojId) : next.add(relojId); setFavIds(next);
    if (has) await fetch(`${API}/api/favorito?usuarioId=${usuario.id}&relojId=${relojId}`, { method: 'DELETE' });
    else await fetch(`${API}/api/favorito`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuarioId: usuario.id, relojId }) });
  };

  React.useEffect(() => {
    setLoading(true);
    fetch(`${API}/api/reloj`)
      .then(res => {
        if (!res.ok) throw new Error('Error al conectar con la API');
        return res.json();
      })
      .then(data => { setRelojes(data); setLoading(false); })
      .catch(() => { setError('No se pudo conectar con la API. Verifica que el servidor esté corriendo.'); setLoading(false); });
  }, [refreshKey]);

  // Precio "desde" = base + los extras mas baratos (para filtrar y ordenar)
  const precioDesde = (r) => {
    const maq = r.movimientosCompatibles || [], pul = r.pulserasCompatibles || [];
    return (r.precio || 0) + (maq.length ? Math.min(...maq.map(m => m.precioExtra)) : 0) + (pul.length ? Math.min(...pul.map(p => p.precioExtra)) : 0);
  };
  const marcas = ['Todos', ...[...new Set(relojes.map(r => r.marca?.nombre || 'Sin Marca'))]];
  let filtered = relojes.filter(r => {
    const q = busqueda.trim().toLowerCase();
    const coincide = !q || `${r.nombre} ${r.modelo || ''} ${r.marca?.nombre || ''}`.toLowerCase().includes(q);
    const marcaOk = active === 'Todos' || (r.marca?.nombre || 'Sin Marca') === active;
    const precioOk = !precioMax || precioDesde(r) <= parseFloat(precioMax);
    return coincide && marcaOk && precioOk;
  });
  if (orden === 'precio-asc') filtered = [...filtered].sort((a, b) => precioDesde(a) - precioDesde(b));
  else if (orden === 'precio-desc') filtered = [...filtered].sort((a, b) => precioDesde(b) - precioDesde(a));
  else if (orden === 'nombre') filtered = [...filtered].sort((a, b) => a.nombre.localeCompare(b.nombre));
  else if (orden === 'nuevos') filtered = [...filtered].sort((a, b) => b.id - a.id);

  return (
    <section id="colecciones" style={{ padding: '96px 56px', background: 'var(--white)', scrollMarginTop: 80 }}>
      <div style={{ maxWidth: 1280, margin: '0 auto' }}>

        {/* Cabecera */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 48 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
              <span style={{ width: 24, height: 1, background: 'var(--gold)', display: 'block' }}></span>
              <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.28em', textTransform: 'uppercase', color: 'var(--gold)' }}>Nuestros Modelos</span>
            </div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(38px,4vw,58px)', fontWeight: 600, color: 'var(--ink)', lineHeight: 1.05 }}>La Colección</h2>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {loading && (
              <span style={{ fontSize: 9, color: 'var(--ink-4)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>
                Cargando desde API...
              </span>
            )}
            {!loading && !error && (
              <span style={{ fontSize: 9, color: 'var(--gold)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>
                {filtered.length} modelos disponibles ✦
              </span>
            )}
          </div>
        </div>

        {/* Error */}
        {error && (
          <div style={{
            background: '#fff5f5', border: '1px solid #fecaca', borderRadius: 8,
            padding: '16px 20px', marginBottom: 32, color: '#dc2626', fontSize: 13,
          }}>
            {error}
          </div>
        )}

        {/* Buscador, orden y precio */}
        {!loading && !error && (
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', marginBottom: 20 }}>
            <input value={busqueda} onChange={e => setBusqueda(e.target.value)} placeholder="Buscar por nombre, marca o modelo..." style={{ flex: 1, minWidth: 220, padding: '10px 14px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, fontFamily: 'var(--sans)', outline: 'none', background: 'var(--white)' }} />

        {loading && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 20 }}>

              <div key={i} style={{
                borderRadius: 12, border: '1px solid var(--border)',

                  <div style={{ height: 10, background: 'var(--warm-grey)', borderRadius: 4, marginBottom: 18, width: '80%' }} />
                  <div style={{ height: 32, background: 'var(--warm-grey)', borderRadius: 3 }} />
                </div>
              </div>
            ))}
          </div>
        )}

        {!loading && !error && filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--ink-4)', fontSize: 13 }}>No se encontraron relojes con esos filtros.</div>
        )}

        {/* Grid de relojes */}
        {!loading && !error && filtered.length > 0 && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 20 }}>
            {filtered.map((w, i) => {
              // Modelo BOM: precio "desde" = base + extras mas baratos; disponible = min(base, mejor maquina, mejor pulsera)
              const maq = w.movimientosCompatibles || [];
              const pul = w.pulserasCompatibles || [];
              const desde = precioDesde(w);
              const stockTotal = (maq.length && pul.length) ? Math.min(w.stock || 0, Math.max(...maq.map(m => m.stock)), Math.max(...pul.map(p => p.stock))) : (w.stock || 0);
              const rese = w.resenas || [];
              const rprom = rese.length ? rese.reduce((s, r) => s + r.calificacion, 0) / rese.length : 0;
              return (
              <div key={w.id}
                onClick={() => onAbrir(w.id)}

                  transform: hov === i ? 'translateY(-6px)' : 'translateY(0)',
                  boxShadow: hov === i

                {/* Imagen / placeholder */}
                <div style={{ background: 'var(--white)', height: 210, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 70% 70% at 50% 55%, var(--off-white) 0%, var(--white) 70%)', pointerEvents: 'none' }} />
                  {getImageUrl(w.imagenUrl) ? (
                    <img src={getImageUrl(w.imagenUrl)} alt={w.nombre}
                      style={{
                        height: 185, width: 'auto', objectFit: 'contain', position: 'relative', zIndex: 1,
                        transition: 'transform 0.5s var(--ease)',
                        transform: hov === i ? 'scale(1.07)' : 'scale(1)',
                        filter: 'drop-shadow(0 16px 32px rgba(0,0,0,0.16)) drop-shadow(0 4px 8px rgba(0,0,0,0.08))',
                      }} />
                  ) : (
                    <div style={{ position: 'relative', zIndex: 1, transition: 'transform 0.5s var(--ease)', transform: hov === i ? 'scale(1.07)' : 'scale(1)' }}>
                      <WatchPlaceholder size={160} hovered={hov === i} />
                    </div>
                  )}
                  {stockTotal <= 3 && stockTotal > 0 && (
                    <span style={{
                      position: 'absolute', top: 10, left: 10, zIndex: 2,
                      fontSize: 7.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase',
                      background: 'var(--rose)', color: 'var(--white)', padding: '4px 9px', borderRadius: 2,
                    }}>Últimas {stockTotal}</span>
                  )}
                  {stockTotal === 0 && (
                    <span style={{
                      position: 'absolute', top: 10, left: 10, zIndex: 2,
                      fontSize: 7.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase',
                      background: 'var(--ink-3)', color: 'var(--white)', padding: '4px 9px', borderRadius: 2,
                    }}>Agotado</span>
                  )}
                  {usuario && (
                    <button onClick={e => { e.stopPropagation(); toggleFav(w.id); }} title="Favorito" style={{ position: 'absolute', top: 8, right: 8, zIndex: 2, width: 32, height: 32, borderRadius: '50%', border: '1px solid var(--border)', background: 'rgba(255,255,255,0.92)', cursor: 'pointer', fontSize: 15, lineHeight: 1, color: favIds.has(w.id) ? 'var(--rose)' : 'var(--ink-4)' }}>{favIds.has(w.id) ? '♥' : '♡'}</button>
                  )}
                </div>

                {/* Info */}
                <div style={{ padding: '15px 17px 17px' }}>
                  <div style={{ fontSize: 7.5, fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 5 }}>
                    {w.marca?.nombre || 'Sin Marca'}
                  </div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 19, fontWeight: 600, color: 'var(--ink)', marginBottom: 4, lineHeight: 1.2 }}>
                    {w.nombre}
                  </div>
                  <div style={{ fontSize: 9, color: 'var(--ink-4)', letterSpacing: '0.05em', marginBottom: 6 }}>
                    {w.modelo}
                  </div>
                  {rese.length > 0 && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 8 }}>
                      <Estrellas valor={rprom} tam={11} />
                      <span style={{ fontSize: 9.5, color: 'var(--ink-4)' }}>({rese.length})</span>
                    </div>
                  )}
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 600, color: 'var(--ink-2)', marginBottom: 14 }}>
                    Desde RD$ {desde.toLocaleString('es-DO')}
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); onAbrir(w.id); }} style={{
                    width: '100%', fontSize: 9, fontWeight: 600, letterSpacing: '0.12em',
                    textTransform: 'uppercase', padding: '9px', borderRadius: 3,
                    background: hov === i ? 'var(--ink)' : 'transparent',
                    color: hov === i ? 'var(--white)' : 'var(--ink-3)',
                    border: '1px solid var(--border-dk)', transition: 'all 0.25s',
                  }}>
                    Ver Detalle
                  </button>
                </div>
              </div>
              );
            })}
          </div>
        )}
      </div>
      {detalle && <ConfiguradorReloj reloj={detalle} onClose={onCerrarDetalle} onAgregar={onAgregar} usuario={usuario} />}
    </section>
  );
}

/* ══════════════════════════════════════════════════
   PANEL DE CUENTA (Login / Registro / Admin)
══════════════════════════════════════════════════ */
function PanelCuenta({ open, onClose, usuario, onLogin, onLogout, onRelojCreado }) {
  const [tab, setTab]         = React.useState('login');
  const [loading, setLoading] = React.useState(false);
  const [msg, setMsg]         = React.useState(null);
  const [marcas, setMarcas]   = React.useState([]);
  const [imagen, setImagen]   = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [adminMsg, setAdminMsg] = React.useState(null);
  const [adminLoading, setAdminLoading] = React.useState(false);

  const [loginForm, setLoginForm]     = React.useState({ email: '', password: '' });
  const [regForm, setRegForm]         = React.useState({ nombre: '', apellido: '', email: '', password: '', confirmar: '', telefono: '', direccion: '' });
  const [dosFA, setDosFA]             = React.useState(null);   // { usuarioId, demo, codigoDemo } cuando el login pide 2FA
  const [codigo2FA, setCodigo2FA]     = React.useState('');
  const [recPaso, setRecPaso]         = React.useState(null);   // null | 'email' | 'enviado' — flujo de recuperar contraseña
  const [recForm, setRecForm]         = React.useState({ email: '' });
  const [recEnlaceDemo, setRecEnlaceDemo] = React.useState(null); // enlace mostrado solo en modo demo (sin correo real)
  const [relojForm, setRelojForm]     = React.useState({ nombre: '', modelo: '', precio: '', stock: '', marcaId: '' });

  React.useEffect(() => {
    if (usuario?.esAdmin && marcas.length === 0)
      fetch(`${API}/api/marca`).then(r => r.json()).then(setMarcas).catch(() => {});
  }, [usuario]);

  const handleLogin = async (e) => {
    e.preventDefault(); setLoading(true); setMsg(null);
    try {
      const r = await fetch(`${API}/api/usuario/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(loginForm),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al iniciar sesión');
      if (d.requiere2FA) {
        setDosFA({ usuarioId: d.usuarioId, demo: d.demo, codigoDemo: d.codigoDemo });
        setMsg(d.demo
          ? { ok: true, texto: `Modo demo: tu código de acceso es ${d.codigoDemo}` }
          : { ok: true, texto: 'Te enviamos un código de acceso a tu correo.' });
        return;
      }
      onLogin(d);
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
    finally { setLoading(false); }
  };

  const handleVerificar2FA = async (e) => {
    e.preventDefault(); setLoading(true); setMsg(null);
    try {
      const r = await fetch(`${API}/api/usuario/verificar-2fa`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuarioId: dosFA.usuarioId, codigo: codigo2FA }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Código inválido');
      setDosFA(null); setCodigo2FA('');
      onLogin(d);
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
    finally { setLoading(false); }
  };

  const handleRecuperar = async (e) => {
    e.preventDefault(); setLoading(true); setMsg(null);
    try {
      const r = await fetch(`${API}/api/usuario/recuperar`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: recForm.email }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al enviar el enlace');
      setRecPaso('enviado');
      setRecEnlaceDemo(d.demo ? d.enlaceDemo : null);
      setMsg({ ok: true, texto: 'Si el correo existe, te enviamos un enlace para restablecer tu contraseña. Revisa tu bandeja de entrada (y la carpeta de spam).' });
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
    finally { setLoading(false); }
  };

  const handleRegistro = async (e) => {
    e.preventDefault(); setMsg(null);
    const errPwd = validarPassword(regForm.password);
    if (errPwd) { setMsg({ ok: false, texto: errPwd }); return; }
    if (regForm.password !== regForm.confirmar) { setMsg({ ok: false, texto: 'Las contraseñas no coinciden' }); return; }
    setLoading(true);
    try {
      const { confirmar, ...payload } = regForm;
      const r = await fetch(`${API}/api/usuario/registro`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.mensaje || 'Error al registrarse');
      onLogin(d);
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
    finally { setLoading(false); }
  };

  const handleAgregarReloj = async (e) => {
    e.preventDefault(); setAdminLoading(true); setAdminMsg(null);
    try {
      let imagenUrl = null;
      if (imagen) {
        const fd = new FormData(); fd.append('archivo', imagen);
        const r = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
        if (!r.ok) throw new Error('Error al subir la imagen');
        imagenUrl = (await r.json()).url;
      }
      const r = await fetch(`${API}/api/reloj`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...relojForm, precio: parseFloat(relojForm.precio), stock: parseInt(relojForm.stock), marcaId: parseInt(relojForm.marcaId), imagenUrl }),
      });
      if (!r.ok) throw new Error('Error al crear el reloj');
      const nuevo = await r.json();
      setAdminMsg({ ok: true, texto: `"${nuevo.nombre}" agregado exitosamente` });
      setRelojForm({ nombre: '', modelo: '', precio: '', stock: '', marcaId: '' });
      setImagen(null); setPreview(null);
      onRelojCreado();
    } catch (err) { setAdminMsg({ ok: false, texto: err.message }); }
    finally { setAdminLoading(false); }
  };

  const inp = { width: '100%', padding: '11px 13px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 6 };
  const field = (children) => <div style={{ marginBottom: 14 }}>{children}</div>;

  if (!open) return null;

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 300, display: 'flex', justifyContent: 'flex-end' }}>
      {/* Overlay */}
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(17,17,16,0.5)', backdropFilter: 'blur(6px)' }} />

      {/* Panel lateral */}
      <div style={{
        position: 'relative', zIndex: 1, width: 420, height: '100%',
        background: 'var(--white)', boxShadow: '-24px 0 60px rgba(0,0,0,0.18)',
        display: 'flex', flexDirection: 'column', overflowY: 'auto',
      }}>
        {/* Header del panel */}
        <div style={{ padding: '28px 32px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 8, fontWeight: 600, letterSpacing: '0.26em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 4 }}>Dominican Watch Men</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 600, color: 'var(--ink)' }}>
              {usuario ? `Hola, ${usuario.nombre}` : 'Mi Cuenta'}
            </div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: 'var(--ink-3)', padding: 6 }}>✕</button>
        </div>

        <div style={{ padding: '24px 32px', flex: 1 }}>

          {/* ── LOGUEADO ── */}
          {usuario && (
            <>
              {/* Info del usuario */}
              <div style={{ background: 'var(--off-white)', borderRadius: 10, padding: '20px', marginBottom: 24, border: '1px solid var(--border)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'var(--gold-pale)', border: '1px solid var(--gold-lt)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--gold)', fontWeight: 600 }}>{usuario.nombre[0]}</span>
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--ink)' }}>{usuario.nombre} {usuario.apellido}</div>
                    <div style={{ fontSize: 11, color: 'var(--ink-4)', marginTop: 2 }}>{usuario.email}</div>
                    {usuario.esAdmin && (
                      <span style={{ display: 'inline-block', marginTop: 4, fontSize: 7.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', padding: '3px 8px', borderRadius: 2 }}>Administrador</span>
                    )}
                  </div>
                </div>
              </div>

              {/* Panel admin — solo si esAdmin */}
              {usuario.esAdmin && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                    <span style={{ width: 16, height: 1, background: 'var(--gold)', display: 'block' }} />
                    <span style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)' }}>Panel Admin</span>
                  </div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 18 }}>Agregar Reloj</div>

                  <form onSubmit={handleAgregarReloj}>
                    {field(<><label style={lbl}>Marca</label>
                      <select value={relojForm.marcaId} onChange={e => setRelojForm({...relojForm, marcaId: e.target.value})} required style={inp}>
                        <option value="">Selecciona una marca</option>
                        {marcas.map(m => <option key={m.id} value={m.id}>{m.nombre}</option>)}
                      </select></>)}
                    {field(<><label style={lbl}>Nombre</label><input value={relojForm.nombre} onChange={e => setRelojForm({...relojForm, nombre: e.target.value})} required placeholder="Submariner Mod" style={inp} /></>)}
                    {field(<><label style={lbl}>Modelo</label><input value={relojForm.modelo} onChange={e => setRelojForm({...relojForm, modelo: e.target.value})} required placeholder="NH35-SUB-BK" style={inp} /></>)}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
                      <div><label style={lbl}>Precio (RD$)</label><input type="number" value={relojForm.precio} onChange={e => setRelojForm({...relojForm, precio: e.target.value})} required min="0" step="0.01" placeholder="12500" style={inp} /></div>
                      <div><label style={lbl}>Stock</label><input type="number" value={relojForm.stock} onChange={e => setRelojForm({...relojForm, stock: e.target.value})} required min="0" placeholder="5" style={inp} /></div>
                    </div>
                    {field(<>
                      <label style={lbl}>Imagen</label>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', border: '1px dashed var(--border-dk)', borderRadius: 4, cursor: 'pointer' }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--gold)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border-dk)'}>
                        <input type="file" accept="image/*" onChange={e => { const f = e.target.files[0]; if(f){ setImagen(f); setPreview(URL.createObjectURL(f)); }}} style={{ display: 'none' }} />
                        {preview ? <img src={preview} style={{ height: 48, objectFit: 'contain' }} /> : <span style={{ fontSize: 20, color: 'var(--ink-4)' }}>+</span>}
                        <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>{imagen ? imagen.name : 'Seleccionar imagen'}</span>
                      </label>
                    </>)}
                    {adminMsg && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 12, fontSize: 12, background: adminMsg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${adminMsg.ok ? '#bbf7d0' : '#fecaca'}`, color: adminMsg.ok ? '#166534' : '#dc2626' }}>{adminMsg.texto}</div>}
                    <button type="submit" disabled={adminLoading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: adminLoading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: adminLoading ? 'not-allowed' : 'pointer' }}>
                      {adminLoading ? 'Guardando...' : 'Agregar a la Colección'}
                    </button>
                  </form>
                </div>
              )}

              {/* Cerrar sesión */}
              <button onClick={onLogout} style={{ width: '100%', padding: '12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer', transition: 'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--rose)'; e.currentTarget.style.color = 'var(--rose)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border-dk)'; e.currentTarget.style.color = 'var(--ink-3)'; }}>
                Cerrar Sesión
              </button>
            </>
          )}

          {/* ── NO LOGUEADO ── */}
          {!usuario && (
            <>
              {msg && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 16, fontSize: 12, background: msg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msg.ok ? '#bbf7d0' : '#fecaca'}`, color: msg.ok ? '#166534' : '#dc2626' }}>{msg.texto}</div>}

              {/* ── Verificación en dos pasos (segundo paso del login) ── */}
              {dosFA && (
                <form onSubmit={handleVerificar2FA}>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 8 }}>Verificación en dos pasos</div>
                  <p style={{ fontSize: 12, color: 'var(--ink-3)', marginBottom: 18, lineHeight: 1.6 }}>Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
                  {field(<><label style={lbl}>Código de acceso</label><input value={codigo2FA} onChange={e => setCodigo2FA(e.target.value)} required placeholder="000000" maxLength={6} style={{ ...inp, letterSpacing: '0.3em', textAlign: 'center', fontSize: 18 }} /></>)}
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer', marginTop: 8 }}>
                    {loading ? 'Verificando...' : 'Verificar y Entrar'}
                  </button>
                  <button type="button" onClick={() => { setDosFA(null); setCodigo2FA(''); setMsg(null); }} style={{ width: '100%', padding: '10px', marginTop: 10, fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: 'none', cursor: 'pointer' }}>Cancelar</button>
                </form>
              )}

              {/* ── Recuperar contraseña (envia un enlace al correo) ── */}
              {!dosFA && recPaso && (
                <div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, color: 'var(--ink)', marginBottom: 8 }}>Recuperar contraseña</div>
                  {recPaso === 'email' ? (
                    <form onSubmit={handleRecuperar}>
                      <p style={{ fontSize: 12, color: 'var(--ink-3)', marginBottom: 18, lineHeight: 1.6 }}>Ingresa tu correo y te enviaremos un enlace para crear una nueva contraseña.</p>
                      {field(<><label style={lbl}>Correo Electrónico</label><input type="email" value={recForm.email} onChange={e => setRecForm({ email: e.target.value })} required placeholder="correo@email.com" style={inp} /></>)}
                      <button type="submit" disabled={loading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer', marginTop: 8 }}>
                        {loading ? 'Enviando...' : 'Enviar Enlace'}
                      </button>
                    </form>
                  ) : (
                    <>
                      <p style={{ fontSize: 12, color: 'var(--ink-3)', marginBottom: 14, lineHeight: 1.6 }}>Haz clic en el enlace del correo para crear tu nueva contraseña. El enlace vence en 30 minutos.</p>
                      {recEnlaceDemo && <div style={{ padding: '12px 14px', borderRadius: 6, marginBottom: 14, fontSize: 12, background: 'var(--off-white)', border: '1px solid var(--border)', color: 'var(--ink-2)', wordBreak: 'break-all' }}>Modo demo (sin correo real): <a href={recEnlaceDemo} style={{ color: 'var(--gold)' }}>abrir enlace de restablecimiento</a></div>}
                    </>
                  )}
                  <button type="button" onClick={() => { setRecPaso(null); setRecForm({ email: '' }); setRecEnlaceDemo(null); setMsg(null); }} style={{ width: '100%', padding: '10px', marginTop: 10, fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink-3)', border: 'none', cursor: 'pointer' }}>Volver a Iniciar Sesión</button>
                </div>
              )}

              {/* ── Login / Registro ── */}
              {!dosFA && !recPaso && (<>
              {/* Tabs */}
              <div style={{ display: 'flex', gap: 0, marginBottom: 24, borderBottom: '1px solid var(--border)' }}>
                {[['login', 'Iniciar Sesión'], ['registro', 'Crear Cuenta']].map(([key, label]) => (
                  <button key={key} onClick={() => { setTab(key); setMsg(null); }} style={{
                    flex: 1, padding: '12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em',
                    textTransform: 'uppercase', background: 'none', border: 'none', cursor: 'pointer',
                    color: tab === key ? 'var(--ink)' : 'var(--ink-4)',
                    borderBottom: tab === key ? '2px solid var(--gold)' : '2px solid transparent',
                    marginBottom: -1, transition: 'all 0.2s',
                  }}>{label}</button>
                ))}
              </div>

              {/* Login */}
              {tab === 'login' && (
                <form onSubmit={handleLogin}>
                  {field(<><label style={lbl}>Correo Electrónico</label><input type="email" value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} required placeholder="correo@email.com" style={inp} /></>)}
                  {field(<><label style={lbl}>Contraseña</label><PasswordInput value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} required style={inp} /></>)}
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer', marginTop: 8 }}>
                    {loading ? 'Verificando...' : 'Iniciar Sesión'}
                  </button>
                  <button type="button" onClick={() => { setRecPaso('email'); setRecForm({ email: loginForm.email }); setRecEnlaceDemo(null); setMsg(null); }} style={{ display: 'block', width: '100%', textAlign: 'center', marginTop: 14, background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, color: 'var(--ink-3)', textDecoration: 'underline' }}>¿Olvidaste tu contraseña?</button>
                </form>
              )}

              {/* Registro */}
              {tab === 'registro' && (
                <form onSubmit={handleRegistro}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
                    <div><label style={lbl}>Nombre</label><input value={regForm.nombre} onChange={e => setRegForm({...regForm, nombre: e.target.value})} required placeholder="Carlos" style={inp} /></div>
                    <div><label style={lbl}>Apellido</label><input value={regForm.apellido} onChange={e => setRegForm({...regForm, apellido: e.target.value})} required placeholder="Martínez" style={inp} /></div>
                  </div>
                  {field(<><label style={lbl}>Correo Electrónico</label><input type="email" value={regForm.email} onChange={e => setRegForm({...regForm, email: e.target.value})} required placeholder="correo@email.com" style={inp} /></>)}
                  {field(<><label style={lbl}>Contraseña</label><PasswordInput value={regForm.password} onChange={e => setRegForm({...regForm, password: e.target.value})} required style={inp} /><div style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 5 }}>{REQ_PASSWORD}</div></>)}
                  {field(<><label style={lbl}>Confirmar Contraseña</label><PasswordInput value={regForm.confirmar} onChange={e => setRegForm({...regForm, confirmar: e.target.value})} required style={{ ...inp, ...(regForm.confirmar && regForm.password !== regForm.confirmar ? { borderColor: 'var(--rose)' } : {}) }} />{regForm.confirmar && regForm.password !== regForm.confirmar && <div style={{ fontSize: 10, color: 'var(--rose)', marginTop: 5 }}>Las contraseñas no coinciden</div>}</>)}
                  {field(<><label style={lbl}>Teléfono</label><input value={regForm.telefono} onChange={e => setRegForm({...regForm, telefono: e.target.value})} placeholder="809-555-0101" style={inp} /></>)}
                  {field(<><label style={lbl}>Dirección</label><input value={regForm.direccion} onChange={e => setRegForm({...regForm, direccion: e.target.value})} placeholder="Av. Winston Churchill, SD" style={inp} /></>)}
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer', marginTop: 8 }}>
                    {loading ? 'Creando cuenta...' : 'Crear Mi Cuenta'}
                  </button>
                </form>
              )}
              </>)}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MODAL CREAR / EDITAR RELOJ
══════════════════════════════════════════════════ */
function RelojModal({ modo, reloj, marcas, onClose, onGuardado }) {
  const [form, setForm]       = React.useState({
    nombre: reloj?.nombre || '', modelo: reloj?.modelo || '',
    precio: reloj?.precio || '', stock: reloj?.stock || '',
    marcaId: reloj?.marcaId || '', imagenUrl: reloj?.imagenUrl || '',
    tipoModelo: reloj?.tipoModelo || '',
  });
  const [imagen, setImagen]   = React.useState(null);
  const [preview, setPreview] = React.useState(reloj?.imagenUrl ? getImageUrl(reloj.imagenUrl) : null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault(); setLoading(true); setError(null);
    try {
      let imagenUrl = form.imagenUrl;
      if (imagen) {
        const fd = new FormData(); fd.append('archivo', imagen);
        const upRes = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
        if (!upRes.ok) throw new Error('Error al subir imagen');
        imagenUrl = (await upRes.json()).url;
      }
      const url    = modo === 'crear' ? `${API}/api/reloj` : `${API}/api/reloj/${reloj.id}`;
      const method = modo === 'crear' ? 'POST' : 'PUT';
      const saveRes = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...form, precio: parseFloat(form.precio), stock: parseInt(form.stock), marcaId: parseInt(form.marcaId), imagenUrl }),
      });
      if (!saveRes.ok) throw new Error('Error al guardar');
      onGuardado();
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  const inp = { width: '100%', padding: '11px 13px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 13, color: 'var(--ink)', fontFamily: 'var(--sans)', boxSizing: 'border-box', outline: 'none', background: 'var(--white)' };
  const lbl = { display: 'block', fontSize: 8.5, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 6 };

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 400, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--white)', borderRadius: 16, padding: '36px 40px', width: '100%', maxWidth: 560, maxHeight: '90vh', overflowY: 'auto', boxShadow: '0 32px 80px rgba(0,0,0,0.24)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>{modo === 'crear' ? 'Nuevo Reloj' : 'Editar Reloj'}</div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 600, color: 'var(--ink)' }}>{modo === 'crear' ? 'Agregar a la Colección' : reloj.nombre}</h2>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)', padding: 4 }}>✕</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 14 }}>
            <label style={lbl}>Marca</label>
            <select value={form.marcaId} onChange={e => setForm({...form, marcaId: e.target.value})} required style={inp}>
              <option value="">Selecciona una marca</option>
              {marcas.map(m => <option key={m.id} value={m.id}>{m.nombre}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={lbl}>Nombre</label>
            <input value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} required placeholder="Submariner Mod" style={inp} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={lbl}>Modelo</label>
            <input value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} required placeholder="NH35-SUB-BK" style={inp} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={lbl}>Tipo de modelo (sugiere pulseras)</label>
            <select value={form.tipoModelo} onChange={e => setForm({...form, tipoModelo: e.target.value})} style={inp}>
              <option value="">Sin especificar</option>
              <option value="Diver">Diver (buceo)</option>
              <option value="GMT">GMT</option>
              <option value="Dress">Dress (vestir)</option>
              <option value="Field">Field (campo)</option>
            </select>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
            <div><label style={lbl}>Precio base (RD$)</label><input type="number" value={form.precio} onChange={e => setForm({...form, precio: e.target.value})} required min="0" step="0.01" placeholder="12500" style={inp} /></div>
            <div><label style={lbl}>Stock</label><input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} required min="0" placeholder="5" style={inp} /></div>
          </div>
          <div style={{ marginBottom: 24 }}>
            <label style={lbl}>Imagen</label>
            <label style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '12px 14px', border: '1px dashed var(--border-dk)', borderRadius: 4, cursor: 'pointer', transition: 'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--gold)'}
              onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border-dk)'}>
              <input type="file" accept="image/*" onChange={e => { const f = e.target.files[0]; if(f){ setImagen(f); setPreview(URL.createObjectURL(f)); }}} style={{ display: 'none' }} />
              {preview
                ? <img src={preview} style={{ height: 56, width: 56, objectFit: 'contain', filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.12))' }} />
                : <div style={{ width: 56, height: 56, borderRadius: 6, background: 'var(--warm-grey)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, color: 'var(--ink-4)' }}>+</div>
              }
              <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>{imagen ? imagen.name : (preview ? 'Imagen actual · Clic para cambiar' : 'Seleccionar imagen')}</span>
            </label>
          </div>
          {error && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 14, fontSize: 12, background: '#fff5f5', border: '1px solid #fecaca', color: '#dc2626' }}>{error}</div>}
          <div style={{ display: 'flex', gap: 12 }}>
            <button type="button" onClick={onClose} style={{ flex: 1, padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'transparent', color: 'var(--ink)', border: '1px solid var(--border-dk)', borderRadius: 3, cursor: 'pointer' }}>Cancelar</button>
            <button type="submit" disabled={loading} style={{ flex: 2, padding: '13px', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', background: loading ? 'var(--ink-3)' : 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: loading ? 'not-allowed' : 'pointer', transition: 'background 0.2s' }}
              onMouseEnter={e => { if(!loading) e.currentTarget.style.background = 'var(--gold)'; }}
              onMouseLeave={e => { if(!loading) e.currentTarget.style.background = 'var(--ink)'; }}>
              {loading ? 'Guardando...' : (modo === 'crear' ? 'Agregar Reloj' : 'Guardar Cambios')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PÁGINA DE ADMINISTRACIÓN
══════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════
   MODAL DE COMPATIBILIDAD — que maquinas y pulseras admite un reloj
   (el inventario NO vive aqui; vive en cada componente)
══════════════════════════════════════════════════ */
function CompatibilidadModal({ reloj, onClose, onCambio }) {
  const [maquinas, setMaquinas] = React.useState([]);
  const [pulseras, setPulseras] = React.useState([]);
  const [selMaq, setSelMaq]     = React.useState({});
  const [selPul, setSelPul]     = React.useState({});
  const [msg, setMsg]           = React.useState(null);
  const [loading, setLoading]   = React.useState(true);

  React.useEffect(() => {
    Promise.all([
      fetch(`${API}/api/movimiento`).then(r => r.json()),
      fetch(`${API}/api/tipopulsera`).then(r => r.json()),
      fetch(`${API}/api/reloj/${reloj.id}`).then(r => r.json()),
    ]).then(([m, p, r]) => {
      setMaquinas(m); setPulseras(p);
      const sm = {}; (r.movimientosCompatibles || []).forEach(x => sm[x.id] = true); setSelMaq(sm);
      const sp = {}; (r.pulserasCompatibles || []).forEach(x => sp[x.id] = true); setSelPul(sp);
      setLoading(false);
    }).catch(() => { setMsg({ ok: false, texto: 'Error al cargar' }); setLoading(false); });
  }, []);

  const toggle = (setter, id) => setter(prev => ({ ...prev, [id]: !prev[id] }));

  const guardar = async () => {
    setMsg(null);
    const payload = {
      movimientoIds: Object.keys(selMaq).filter(k => selMaq[k]).map(Number),
      tipoPulseraIds: Object.keys(selPul).filter(k => selPul[k]).map(Number),
    };
    try {
      const r = await fetch(`${API}/api/reloj/${reloj.id}/compatibilidad`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error('Error al guardar');
      setMsg({ ok: true, texto: 'Compatibilidad guardada' }); onCambio();
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
  };

  const fila = (item, checked, onToggle) => (
    <label key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', borderRadius: 6, cursor: 'pointer', background: checked ? 'var(--gold-bg)' : 'transparent', border: `1px solid ${checked ? 'var(--gold-lt)' : 'var(--border)'}`, marginBottom: 6 }}>
      <input type="checkbox" checked={checked} onChange={onToggle} />
      <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: 'var(--ink)' }}>{item.nombre}</span>
      <span style={{ fontFamily: 'var(--mono)', fontSize: 9.5, color: 'var(--ink-4)' }}>{item.precioExtra > 0 ? `+${item.precioExtra.toLocaleString('es-DO')}` : 'incl'} · stk{item.stock}</span>
    </label>
  );

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--white)', borderRadius: 16, padding: '30px 34px', width: '100%', maxWidth: 680, maxHeight: '92vh', overflowY: 'auto', boxShadow: '0 32px 80px rgba(0,0,0,0.24)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
          <div>
            <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Opciones compatibles</div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, color: 'var(--ink)' }}>{reloj.nombre}</h2>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)' }}>✕</button>
        </div>
        <p style={{ fontSize: 12, color: 'var(--ink-4)', marginBottom: 18 }}>Elige que maquinas y pulseras admite este modelo. El stock de cada pieza se gestiona en "Componentes".</p>

        {msg && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 14, fontSize: 12, background: msg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msg.ok ? '#bbf7d0' : '#fecaca'}`, color: msg.ok ? '#166534' : '#dc2626' }}>{msg.texto}</div>}

        {loading ? <div style={{ textAlign: 'center', padding: 40, color: 'var(--ink-4)' }}>Cargando...</div> : (
          <div className="col2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            <div>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Maquinas</div>
              {maquinas.map(m => fila(m, !!selMaq[m.id], () => toggle(setSelMaq, m.id)))}
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 10 }}>Pulseras</div>
              {pulseras.map(p => fila(p, !!selPul[p.id], () => toggle(setSelPul, p.id)))}
            </div>
          </div>
        )}

        <button onClick={guardar} style={{ marginTop: 24, width: '100%', padding: '13px', fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, cursor: 'pointer' }}>Guardar compatibilidad</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MODAL DE COMPONENTES — inventario propio de maquinas y pulseras (BOM)
══════════════════════════════════════════════════ */
function ComponentesModal({ onClose, onCambio }) {
  const [maquinas, setMaquinas] = React.useState([]);
  const [pulseras, setPulseras] = React.useState([]);
  const [msg, setMsg]           = React.useState(null);
  const [loading, setLoading]   = React.useState(true);

  const cargar = () => {
    Promise.all([
      fetch(`${API}/api/movimiento`).then(r => r.json()),
      fetch(`${API}/api/tipopulsera`).then(r => r.json()),
    ]).then(([m, p]) => { setMaquinas(m); setPulseras(p); setLoading(false); })
      .catch(() => { setMsg({ ok: false, texto: 'Error al cargar' }); setLoading(false); });
  };
  React.useEffect(() => { cargar(); }, []);

  const setCampo = (tipo, id, campo, valor) => {
    const num = campo === 'stock' ? parseInt(valor || 0) : parseFloat(valor || 0);
    const upd = prev => prev.map(x => x.id === id ? { ...x, [campo]: isNaN(num) ? 0 : num } : x);
    if (tipo === 'maquina') setMaquinas(upd); else setPulseras(upd);
  };

  const guardar = async (tipo, item) => {
    setMsg(null);
    const url = tipo === 'maquina' ? `${API}/api/movimiento/${item.id}` : `${API}/api/tipopulsera/${item.id}`;
    try {
      const r = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(item) });
      if (!r.ok) throw new Error('Error al guardar');
      setMsg({ ok: true, texto: `${item.nombre} actualizado` }); onCambio();
    } catch (err) { setMsg({ ok: false, texto: err.message }); }
  };

  const inpm = { width: 66, padding: '6px 8px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 12, fontFamily: 'var(--mono)', boxSizing: 'border-box' };

  const tabla = (titulo, items, tipo) => (
    <div style={{ marginBottom: 22 }}>
      <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 10 }}>{titulo}</div>
      {items.map(it => (
        <div key={it.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
          <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: 'var(--ink)' }}>{it.nombre}</span>
          <label style={{ fontSize: 8, color: 'var(--ink-4)', textTransform: 'uppercase' }}>Stock <input type="number" min="0" value={it.stock} onChange={e => setCampo(tipo, it.id, 'stock', e.target.value)} style={inpm} /></label>
          <label style={{ fontSize: 8, color: 'var(--ink-4)', textTransform: 'uppercase' }}>+RD$ <input type="number" min="0" step="0.01" value={it.precioExtra} onChange={e => setCampo(tipo, it.id, 'precioExtra', e.target.value)} style={inpm} /></label>
          <button onClick={() => guardar(tipo, it)} style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', background: 'var(--ink)', color: 'var(--white)', border: 'none', borderRadius: 3, padding: '6px 12px', cursor: 'pointer' }}>Guardar</button>
        </div>
      ))}
    </div>
  );

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--white)', borderRadius: 16, padding: '30px 34px', width: '100%', maxWidth: 640, maxHeight: '92vh', overflowY: 'auto', boxShadow: '0 32px 80px rgba(0,0,0,0.24)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
          <div>
            <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Inventario de componentes</div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, color: 'var(--ink)' }}>Maquinas y pulseras</h2>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)' }}>✕</button>
        </div>
        <p style={{ fontSize: 12, color: 'var(--ink-4)', marginBottom: 18 }}>Cada componente tiene su propio stock. Un reloj se arma mientras haya base, maquina y pulsera disponibles.</p>
        {msg && <div style={{ padding: '10px 14px', borderRadius: 6, marginBottom: 14, fontSize: 12, background: msg.ok ? '#f0fdf4' : '#fff5f5', border: `1px solid ${msg.ok ? '#bbf7d0' : '#fecaca'}`, color: msg.ok ? '#166534' : '#dc2626' }}>{msg.texto}</div>}
        {loading ? <div style={{ textAlign: 'center', padding: 40, color: 'var(--ink-4)' }}>Cargando...</div> : (<>{tabla('Maquinas', maquinas, 'maquina')}{tabla('Pulseras', pulseras, 'pulsera')}</>)}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MODAL DE PEDIDOS — el admin ve las ordenes de compra
══════════════════════════════════════════════════ */
function PedidosModal({ onClose }) {
  const [pedidos, setPedidos] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [abierto, setAbierto] = React.useState(null);

  React.useEffect(() => {
    fetch(`${API}/api/pedido`).then(r => r.json()).then(d => { setPedidos(d); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  const fmt = (f) => { try { return new Date(f).toLocaleString('es-DO'); } catch (e) { return f; } };

  const estados = ['Pendiente', 'En proceso', 'Enviado', 'Completado', 'Cancelado'];
  const cambiarEstado = async (id, estado) => {
    try {
      const r = await fetch(`${API}/api/pedido/${id}/estado`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ estado }) });
      if (!r.ok) throw new Error();
      setPedidos(prev => prev.map(p => p.id === id ? { ...p, estado } : p));
    } catch (e) {}
  };

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(17,17,16,0.6)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--white)', borderRadius: 16, padding: '30px 34px', width: '100%', maxWidth: 760, maxHeight: '92vh', overflowY: 'auto', boxShadow: '0 32px 80px rgba(0,0,0,0.24)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 8.5, fontWeight: 600, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 6 }}>Ordenes de compra</div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, color: 'var(--ink)' }}>Pedidos ({pedidos.length})</h2>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-3)' }}>✕</button>
        </div>

        {loading ? <div style={{ textAlign: 'center', padding: 40, color: 'var(--ink-4)' }}>Cargando...</div>
          : pedidos.length === 0 ? <div style={{ textAlign: 'center', padding: 40, color: 'var(--ink-4)', fontSize: 13 }}>Aun no hay pedidos.</div>
          : pedidos.map(p => (
            <div key={p.id} style={{ border: '1px solid var(--border)', borderRadius: 10, marginBottom: 10, overflow: 'hidden' }}>
              <div onClick={() => setAbierto(abierto === p.id ? null : p.id)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', cursor: 'pointer', background: 'var(--off-white)' }}>
                <div>
                  <span style={{ fontFamily: 'var(--serif)', fontSize: 16, fontWeight: 600, color: 'var(--ink)' }}>Pedido #{p.id}</span>
                  <span style={{ fontSize: 11, color: 'var(--ink-4)', marginLeft: 10 }}>{p.nombreCliente} {p.apellidoCliente} · {fmt(p.fecha)}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '3px 10px', borderRadius: 9999, background: 'var(--gold-bg)', color: 'var(--gold)' }}>{p.estado}</span>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 14, fontWeight: 600, color: 'var(--ink)' }}>RD$ {p.total.toLocaleString('es-DO')}</span>
                </div>
              </div>
              {abierto === p.id && (
                <div style={{ padding: '14px 16px', fontSize: 12, color: 'var(--ink-2)' }}>
                  {p.items.map(i => (
                    <div key={i.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
                      <span>{i.relojNombre} <span style={{ color: 'var(--ink-4)' }}>({i.maquinaNombre} · {i.pulseraNombre}) x{i.cantidad}</span></span>
                      <span style={{ fontFamily: 'var(--mono)' }}>RD$ {i.subtotal.toLocaleString('es-DO')}</span>
                    </div>
                  ))}
                  <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid var(--border)', fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.7 }}>
                    <strong style={{ color: 'var(--ink)' }}>Envio:</strong> {p.direccion}, {p.ciudad}, {p.provincia} {p.codigoPostal}{p.referencia ? ` (${p.referencia})` : ''}<br />
                    <strong style={{ color: 'var(--ink)' }}>Contacto:</strong> {p.email} · {p.telefono} · <strong style={{ color: 'var(--ink)' }}>Pago:</strong> {p.metodoPago}
                  </div>
                  <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>Cambiar estado:</span>
                    <select value={p.estado} onChange={e => cambiarEstado(p.id, e.target.value)} style={{ padding: '6px 10px', border: '1px solid var(--border-dk)', borderRadius: 4, fontSize: 12, fontFamily: 'var(--sans)', background: 'var(--white)', color: 'var(--ink)' }}>
                      {estados.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
              )}
            </div>
          ))}
      </div>
    </div>
  );
}
